<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Graphene Sublattice Formation</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 10px;
            background: #ffffff;
            color: #000000;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        h1 {
            font-size: clamp(1rem, 4vw, 1.6rem);
            margin: 8px 0;
            text-align: center;
        }

        canvas {
            border: 1px solid #ccc;
            background: #ffffff;
            margin: 8px 0;
            max-width: 100%;
            touch-action: none;
            display: block;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            margin: 8px 0;
        }

        button {
            background: #f0f0f0;
            color: #000;
            border: 1px solid #999;
            padding: 12px 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: clamp(0.85rem, 2.5vw, 1rem);
            min-height: 44px;
            border-radius: 4px;
            touch-action: manipulation;
        }

        button:active { background: #d0d0d0; }

        .slider-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 200px;
            flex: 1;
        }

        .slider-label {
            font-size: clamp(0.75rem, 2vw, 0.9rem);
        }

        input[type=range] {
            width: 100%;
            height: 44px;
            -webkit-appearance: none;
            appearance: none;
            background: #e0e0e0;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px;
            height: 28px;
            background: #333;
            border-radius: 50%;
        }

        input[type=range]::-moz-range-thumb {
            width: 28px;
            height: 28px;
            background: #333;
            border-radius: 50%;
            border: none;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 6px 0;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: clamp(0.7rem, 2vw, 0.85rem);
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        @media (max-width: 480px) {
            .controls { flex-direction: column; }
            button { width: 100%; max-width: 280px; }
            .slider-container { width: 100%; max-width: 280px; }
        }
    </style>
</head>
<body>
    <h1>Graphene Honeycomb Lattice Formation</h1>

    <div class="legend">
        <div class="legend-item">
            <div class="dot" style="background:#ee3333;"></div>
            <span>A Sublattice</span>
        </div>
        <div class="legend-item">
            <div class="dot" style="background:#3333ee;"></div>
            <span>B Sublattice</span>
        </div>
        <div class="legend-item">
            <div class="dot" style="background:#00aa00;"></div>
            <span>Lattice vectors A₁, A₂</span>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <div class="controls">
        <button id="toggleBtn">Show Honeycomb</button>
        <div class="slider-container">
            <span class="slider-label">Overlay</span>
            <input type="range" id="slider" min="0" max="100" value="0">
        </div>
    </div>

    <script>
        var canvas = document.getElementById('canvas');
        var ctx    = canvas.getContext('2d');
        var slider = document.getElementById('slider');
        var btn    = document.getElementById('toggleBtn');

        var dpr = window.devicePixelRatio || 1;
        var logW = 800, logH = 600; // logical (CSS) dimensions

        function resizeCanvas() {
            var maxW = Math.min(window.innerWidth - 20, 800);
            var maxH = window.innerHeight * 0.60;
            var w = maxW;
            var h = w * 0.75;
            if (h > maxH) { h = maxH; w = h / 0.75; }
            logW = Math.round(w);
            logH = Math.round(h);
            dpr  = window.devicePixelRatio || 1;
            canvas.width  = logW * dpr;
            canvas.height = logH * dpr;
            canvas.style.width  = logW + 'px';
            canvas.style.height = logH + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // scale once after resize
            render(parseInt(slider.value));
        }

        function latticeParams() {
            var scale = Math.min(logW, logH) / 600;
            var a     = 40 * scale;
            return { a: a, cx: logW / 2, cy: logH / 2 };
        }

        function triangularPoints(offX, offY) {
            var p = latticeParams();
            var a = p.a, cx = p.cx, cy = p.cy;
            var a1x = a * Math.sqrt(3) / 2, a1y = a * 1.5;
            var a2x = a * Math.sqrt(3) / 2, a2y = -a * 1.5;
            var pts = [];
            for (var i = -5; i <= 5; i++) {
                for (var j = -5; j <= 5; j++) {
                    var x = cx + offX + i * a1x + j * a2x;
                    var y = cy + offY + i * a1y + j * a2y;
                    if (x > -60 && x < logW + 60 && y > -60 && y < logH + 60) {
                        pts.push({ x: x, y: y });
                    }
                }
            }
            return pts;
        }

        function drawDots(pts, color) {
            var r = Math.max(3, Math.min(logW, logH) / 120);
            ctx.fillStyle = color;
            for (var i = 0; i < pts.length; i++) {
                ctx.beginPath();
                ctx.arc(pts[i].x, pts[i].y, r, 0, 2 * Math.PI);
                ctx.fill();
            }
        }

        function drawBonds(pA, pB, alpha) {
            var p = latticeParams();
            var a = p.a;
            ctx.strokeStyle = 'rgba(80,80,80,' + alpha + ')';
            ctx.lineWidth = Math.max(1, Math.min(logW, logH) / 500);
            for (var i = 0; i < pA.length; i++) {
                for (var j = 0; j < pB.length; j++) {
                    var dx = pB[j].x - pA[i].x;
                    var dy = pB[j].y - pA[i].y;
                    var d  = Math.sqrt(dx * dx + dy * dy);
                    if (Math.abs(d - a) < a * 0.12) {
                        ctx.beginPath();
                        ctx.moveTo(pA[i].x, pA[i].y);
                        ctx.lineTo(pB[j].x, pB[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function arrowhead(x, y, angle, color) {
            var s = Math.max(6, Math.min(logW, logH) / 70);
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x - s * Math.cos(angle - Math.PI / 6), y - s * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(x - s * Math.cos(angle + Math.PI / 6), y - s * Math.sin(angle + Math.PI / 6));
            ctx.closePath();
            ctx.fill();
        }

        function drawVector(ox, oy, vx, vy, color, label) {
            ctx.strokeStyle = color;
            ctx.lineWidth = Math.max(2, Math.min(logW, logH) / 250);
            ctx.beginPath();
            ctx.moveTo(ox, oy);
            ctx.lineTo(ox + vx, oy + vy);
            ctx.stroke();
            arrowhead(ox + vx, oy + vy, Math.atan2(vy, vx), color);
            var fs = Math.max(12, Math.min(logW, logH) / 38);
            ctx.fillStyle = color;
            ctx.font = fs + 'px Courier New';
            ctx.fillText(label, ox + vx + 8, oy + vy - 4);
        }

        function render(progress) {
            ctx.clearRect(0, 0, logW, logH);
            var p   = latticeParams();
            var a   = p.a, cx = p.cx, cy = p.cy;
            var d1x = a * Math.sqrt(3) / 2;
            var d1y = a / 2;
            var t   = progress / 100;

            // Separated sublattices with overlay animation
            var sepX = (logW * 0.28) * (1 - t);
            var pA = triangularPoints(-sepX, 0);
            var pB = triangularPoints(sepX + d1x * t, d1y * t);

            if (progress > 70) {
                drawBonds(pA, pB, (progress - 70) / 30);
            }
            drawDots(pA, '#ee3333');
            drawDots(pB, '#3333ee');

            // Honeycomb lattice vectors at full overlay
            if (progress === 100) {
                var hA1x = a * Math.sqrt(3), hA1y = 0;
                var hA2x = a * Math.sqrt(3) / 2, hA2y = a * 1.5;
                drawVector(cx, cy, hA1x, hA1y, '#00aa00', 'A\u2081');
                drawVector(cx, cy, hA2x, hA2y, '#00aa00', 'A\u2082');
            }
        }

        // Slider
        function onSliderChange() {
            var v = parseInt(slider.value);
            btn.textContent = (v === 100) ? 'Show Separated' : 'Show Honeycomb';
            render(v);
        }

        slider.addEventListener('input',  onSliderChange);
        slider.addEventListener('change', onSliderChange);

        // Button
        btn.addEventListener('click', function() {
            if (parseInt(slider.value) < 100) {
                slider.value = 100;
                btn.textContent = 'Show Separated';
            } else {
                slider.value = 0;
                btn.textContent = 'Show Honeycomb';
            }
            render(parseInt(slider.value));
        });

        // Resize / orientation
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', function() {
            setTimeout(resizeCanvas, 120);
        });

        resizeCanvas();
    </script>
</body>
</html>
