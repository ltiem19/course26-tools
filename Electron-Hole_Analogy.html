<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electron-Hole Duality 1D</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { font-size: 1.4rem; margin-bottom: 8px; color: #1f2937; }
    .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 24px; text-align: center; }
    .grid {
      display: flex;
      gap: 4px;
      background: #d1d5db;
      padding: 6px;
      border-radius: 10px;
    }
    .cell {
      width: 50px;
      height: 50px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.85rem;
      transition: all 0.25s ease;
    }
    .electron { background: #2563eb; color: white; }
    .electron.clickable { 
      cursor: pointer; 
      box-shadow: 0 0 0 3px #facc15;
    }
    .electron.clickable:hover { transform: scale(1.08); }
    .hole { background: #ef4444; color: white; }
    
    .move-display {
      background: white;
      padding: 14px 24px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin: 20px 0;
      text-align: center;
    }
    .move-display h3 { font-size: 0.85rem; margin-bottom: 8px; color: #374151; }
    .move-arrows { display: flex; gap: 16px; justify-content: center; align-items: center; }
    .arrow-e { color: #2563eb; font-size: 1.3rem; font-weight: bold; }
    .arrow-h { color: #ef4444; font-size: 1.3rem; font-weight: bold; }
    .arrow-eq { color: #9ca3af; font-size: 1.1rem; }
    
    button {
      padding: 10px 24px;
      background: #4b5563;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    button:hover { background: #374151; }
    
    @media (max-width: 400px) {
      .cell { width: 42px; height: 42px; font-size: 0.75rem; }
      .grid { gap: 3px; padding: 5px; }
    }
  </style>
</head>
<body>
  <h1>Electron-Hole Duality</h1>
  <p class="subtitle">Click an electron next to the hole</p>
  
  <div class="grid" id="grid"></div>
  
  <div class="move-display" id="move-display" style="display: none;">
    <h3>Last Move</h3>
    <div class="move-arrows">
      <span class="arrow-e" id="e-arrow">e⁻ →</span>
      <span class="arrow-eq">=</span>
      <span class="arrow-h" id="h-arrow">h⁺ ←</span>
    </div>
  </div>
  
  <button onclick="reset()">Reset</button>

  <script>
    const N = 6;
    let holePos = 3;
    
    function getDirection(from, to) {
      if (to > from) return ['→', '←'];
      return ['←', '→'];
    }
    
    function canMove(pos) {
      return pos === holePos - 1 || pos === holePos + 1;
    }
    
    function handleClick(pos) {
      if (!canMove(pos)) return;
      
      const [eDir, hDir] = getDirection(pos, holePos);
      holePos = pos;
      render();
      showMove(eDir, hDir);
    }
    
    function showMove(eDir, hDir) {
      document.getElementById('move-display').style.display = 'block';
      document.getElementById('e-arrow').textContent = `e⁻ ${eDir}`;
      document.getElementById('h-arrow').textContent = `h⁺ ${hDir}`;
    }
    
    function render() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      
      for (let i = 0; i < N; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        
        if (i === holePos) {
          cell.classList.add('hole');
          cell.textContent = 'h⁺';
        } else {
          cell.classList.add('electron');
          cell.textContent = 'e⁻';
          if (canMove(i)) {
            cell.classList.add('clickable');
            cell.onclick = () => handleClick(i);
          }
        }
        grid.appendChild(cell);
      }
    }
    
    function reset() {
      holePos = 3;
      document.getElementById('move-display').style.display = 'none';
      render();
    }
    
    render();
  </script>
</body>
</html>
