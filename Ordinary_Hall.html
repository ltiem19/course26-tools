<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hall Effect</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f8fafc;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  display: flex; flex-direction: column; align-items: center;
  padding: 16px 12px; min-height: 100vh;
}
h2 { font-size: 15px; font-weight: 600; color: #1e3a8a; margin-bottom: 12px; }
#wrap { width: 100%; max-width: 620px; }
canvas { width: 100%; display: block; border-radius: 10px; border: 1px solid #cbd5e1; }
#controls {
  width: 100%; max-width: 620px; margin-top: 14px;
  background: #fff; border-radius: 12px;
  padding: 14px 16px; border: 1px solid #e2e8f0;
}
.crow { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
.crow label { font-size: 14px; color: #475569; }
#bval { font-size: 18px; font-weight: 700; color: #b45309; min-width: 44px; text-align: right; }
input[type=range] { width: 100%; accent-color: #333; height: 20px; cursor: pointer; }
.trow { display: flex; justify-content: space-between; font-size: 11px; color: #94a3b8; margin-top: 6px; }
</style>
</head>
<body>
<h2>Hall Effect &mdash; Electron Trajectory (Top View)</h2>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="controls">
  <div class="crow">
    <label>Magnetic field <i>B</i> &odot; (+z)</label>
    <span id="bval">0.00</span>
  </div>
  <input type="range" id="slider" min="0" max="4" step="0.04" value="0">
  <div class="trow">
    <span>B = 0</span>
    <span id="wct">wc*tau = 0.00</span>
    <span>B = 4</span>
  </div>
</div>
<script>
var cvs    = document.getElementById('c');
var ctx    = cvs.getContext('2d');
var slider = document.getElementById('slider');
var bvalEl = document.getElementById('bval');
var wctEl  = document.getElementById('wct');

var L=1, WP=0.42, TAU=1.3, E0=1, DT=0.004, NSTEP=5000, BMAX=4;
var ML, MT, BW, BH;

function px(x) { return ML + (x/L)*BW; }
function py(y) { return MT + (1 - y/WP)*BH; }

function ahead(x1,y1,x2,y2,col,sz) {
  var a = Math.atan2(y2-y1, x2-x1);
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - sz*Math.cos(a-0.38), y2 - sz*Math.sin(a-0.38));
  ctx.lineTo(x2 - sz*Math.cos(a+0.38), y2 - sz*Math.sin(a+0.38));
  ctx.closePath();
  ctx.fill();
}

function track(B) {
  var x=L*0.97, y=WP*0.5, vx=0, vy=0;
  var xs=[x], ys=[y], i, ax, ay;
  for (i=0; i<NSTEP; i++) {
    ax = -E0 - vy*B - vx/TAU;
    ay =  vx*B  - vy/TAU;
    vx += ax*DT; vy += ay*DT;
    x  += vx*DT; y  += vy*DT;
    if (x<0 || y<-0.02 || y>WP+0.02) { break; }
    xs.push(x); ys.push(y);
  }
  return {xs:xs, ys:ys};
}

function draw(B) {
  var W=cvs.width, H=cvs.height, CW=11, i, t, n, ti;
  var al, alH, alF, jy, mx, my, th;
  ML=50; MT=46; BW=W-ML-18; BH=H-MT-24;

  /* edge stripe thickness: fixed in pixels, independent of B */
  var stripeH = Math.round(BH * 0.18);

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);

  /* bar fill */
  ctx.fillStyle='#e8f0fe';
  ctx.fillRect(px(0), py(WP), BW, BH);

  /* edge stripes: gradient runs FROM the border line INTO the bar,
     fading to transparent — so colour is maximum AT the edge */
  if (B > 0.05) {
    alH = Math.min(B/BMAX, 1);
    var alpha = 0.15 + alH * 0.65;

    /* bottom edge (py(0) = bottom border line): blue stripe above it */
    var botY = py(0);                    /* canvas y of bottom border */
    var gbBot = ctx.createLinearGradient(0, botY, 0, botY - stripeH);
    gbBot.addColorStop(0, 'rgba(37,99,235,'+alpha+')');
    gbBot.addColorStop(1, 'rgba(37,99,235,0)');
    ctx.fillStyle = gbBot;
    ctx.fillRect(px(0), botY - stripeH, BW, stripeH);

    /* top edge (py(WP) = top border line): red stripe below it */
    var topY = py(WP);                   /* canvas y of top border */
    var gbTop = ctx.createLinearGradient(0, topY, 0, topY + stripeH);
    gbTop.addColorStop(0, 'rgba(220,38,38,'+alpha+')');
    gbTop.addColorStop(1, 'rgba(220,38,38,0)');
    ctx.fillStyle = gbTop;
    ctx.fillRect(px(0), topY, BW, stripeH);
  }

  /* grid */
  ctx.strokeStyle='rgba(100,130,200,0.12)'; ctx.lineWidth=1;
  for (i=1; i<5; i++) {
    ctx.beginPath(); ctx.moveTo(px(i*0.2),py(0)); ctx.lineTo(px(i*0.2),py(WP)); ctx.stroke();
  }
  ctx.beginPath(); ctx.moveTo(px(0),py(WP/2)); ctx.lineTo(px(1),py(WP/2)); ctx.stroke();

  /* bar border + contacts: black */
  ctx.strokeStyle='#111'; ctx.lineWidth=2;
  ctx.strokeRect(px(0), py(WP), BW, BH);
  ctx.fillStyle='#111';
  ctx.fillRect(px(0)-CW, py(WP), CW, BH);
  ctx.fillRect(px(L),    py(WP), CW, BH);
  ctx.font='bold 11px system-ui'; ctx.textAlign='center';
  ctx.fillText('Source', px(0)-CW+CW/2, py(WP)-9);
  ctx.fillText('Drain',  px(L)+CW/2,    py(WP)-9);

  /* B dots */
  if (B>0.05) {
    al = Math.min(B/BMAX,1);
    for (var bx=0.08; bx<1; bx+=0.17) {
      for (var by=0.15; by<1; by+=0.28) {
        var cx=px(bx), cy=py(by*WP);
        ctx.strokeStyle='rgba(180,120,0,'+(0.25+al*0.55)+')'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.arc(cx,cy,5,0,Math.PI*2); ctx.stroke();
        ctx.fillStyle='rgba(180,120,0,'+(0.5+al*0.4)+')';
        ctx.beginPath(); ctx.arc(cx,cy,1.5,0,Math.PI*2); ctx.fill();
      }
    }
    ctx.fillStyle='rgba(130,80,0,0.75)'; ctx.font='11px system-ui'; ctx.textAlign='right';
    ctx.fillText('B out of plane', W-18-CW-6, MT+13);
  }

  /* E_y arrow: solid black, length grows with B, centred in bar */
  if (B > 0.05) {
    alH = Math.min(B/BMAX, 1);
    var arX   = px(0.78);
    var arMid = py(WP/2);
    var arHalf = (BH * 0.45) * alH;
    var arTop  = arMid - arHalf;
    var arBot  = arMid + arHalf;

    ctx.strokeStyle='#111'; ctx.lineWidth=2;
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(arX, arTop); ctx.lineTo(arX, arBot); ctx.stroke();
    ahead(arX, arTop, arX, arBot, '#111', 8);

    ctx.fillStyle='#111'; ctx.font='bold 12px system-ui'; ctx.textAlign='left';
    ctx.fillText('E\u1D67', arX+6, arMid+5);

    /* +/- signs scale with B */
    ctx.font='bold 13px system-ui'; ctx.textAlign='center';
    ctx.fillStyle='rgba(220,38,38,'+alH+')';
    ctx.fillText('+', arX, py(WP)+14);
    ctx.fillStyle='rgba(37,99,235,'+alH+')';
    ctx.fillText('-', arX, py(0)-5);
  }

  /* j arrow */
  jy=MT*0.45;
  ctx.strokeStyle='#b45309'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(px(0.08),jy); ctx.lineTo(px(0.52),jy); ctx.stroke();
  ahead(px(0.08),jy, px(0.52),jy, '#b45309',8);
  ctx.fillStyle='#b45309'; ctx.font='bold 12px system-ui'; ctx.textAlign='left';
  ctx.fillText('j \u2192', px(0.54), jy+4);

  /* electron track */
  t=track(B); n=t.xs.length;
  if (n>=2) {
    ctx.beginPath(); ctx.moveTo(px(t.xs[0]),py(t.ys[0]));
    for (i=1; i<n; i++) { ctx.lineTo(px(t.xs[i]),py(t.ys[i])); }
    ctx.strokeStyle='#dc2626'; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.stroke();
    if (n>8) {
      ti=Math.max(0,n-12);
      ahead(px(t.xs[ti]),py(t.ys[ti]), px(t.xs[n-1]),py(t.ys[n-1]), '#dc2626',8);
    }
  }

  /* F_L arrow */
  if (B>0.2) {
    alF=Math.min((B-0.2)/2,1);
    mx=px(0.35); my=py(WP*0.5);
    ctx.strokeStyle='rgba(109,40,217,'+alF+')'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(mx,my); ctx.lineTo(mx,my+18*alF); ctx.stroke();
    ahead(mx,my, mx,my+18*alF,'rgba(109,40,217,'+alF+')',6);
    ctx.fillStyle='rgba(109,40,217,'+alF+')'; ctx.font='10px system-ui'; ctx.textAlign='center';
    ctx.fillText('F_L', mx, my+30*alF);
  }

  /* info line */
  th = B>0 ? Math.atan(B*TAU)*180/Math.PI : 0;
  ctx.fillStyle='#64748b'; ctx.font="11px 'Courier New',monospace"; ctx.textAlign='left';
  ctx.fillText('th_H='+th.toFixed(1)+'deg  wc*tau='+(B*TAU).toFixed(2), ML, H-7);

  /* axes */
  ctx.fillStyle='#94a3b8'; ctx.font='10px system-ui'; ctx.textAlign='center';
  ctx.fillText('x \u2192', px(1)-10, H-7);
  ctx.save(); ctx.translate(13,py(WP/2)); ctx.rotate(-Math.PI/2);
  ctx.fillText('y \u2192',0,0); ctx.restore();
}

function resize() {
  cvs.width  = document.getElementById('wrap').clientWidth;
  cvs.height = Math.round(cvs.width*0.5);
  draw(parseFloat(slider.value));
}

function onInput() {
  var B = parseFloat(slider.value);
  bvalEl.textContent = B.toFixed(2);
  wctEl.textContent  = 'wc*tau = '+(B*TAU).toFixed(2);
  draw(B);
}

slider.addEventListener('input', onInput);
window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
