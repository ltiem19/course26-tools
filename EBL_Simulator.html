<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EBL Proximity Tool - Mobile</title>
    <style>
        /* Mobile-first styling */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #050505; color: #00ff41; 
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }
        .wrapper { 
            width: 100%; max-width: 600px; 
            background: #111; padding: 15px; 
            border-radius: 12px; border: 1px solid #333;
            box-sizing: border-box;
        }
        canvas { 
            background: #000; border: 1px solid #444; border-radius: 4px; 
            width: 100%; height: auto; /* Responsive scaling */
            touch-action: none; /* Prevents scrolling while interacting */
        }
        .controls { width: 100%; margin-top: 15px; }
        .panel { 
            background: #1a1a1a; padding: 15px; 
            border: 1px solid #333; border-radius: 10px; 
        }
        label { 
            font-size: 1.1em; color: #fff; display: block; 
            margin-bottom: 12px; font-weight: bold; 
        }
        /* Fat-finger friendly slider */
        input[type=range] { 
            width: 100%; height: 35px; 
            accent-color: #ffff00; cursor: pointer;
        }
        .legend { font-size: 0.75em; color: #888; margin-top: 15px; text-align: center; line-height: 1.5; }
        .highlight { color: #ffff00; font-weight: bold; }
    </style>
</head>
<body>
    <div class="wrapper">
        <canvas id="mcCanvas" width="600" height="600"></canvas>
        <div class="controls">
            <div class="panel">
                <label id="eLab">Beam Energy: 25 keV</label>
                <input type="range" id="energy" min="5" max="50" value="25">
                <div style="font-size: 0.8em; color: #666; margin-top: 5px;">Resist: 1000 nm (Fixed)</div>
            </div>
        </div>
        <div class="legend">
            <span style="color:#ff3232">Red: Forward</span> | 
            <span style="color:#5096ff">Blue: Backscatter</span><br>
            <span class="highlight">Yellow: Proximity Exposure Area</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mcCanvas');
        const ctx = canvas.getContext('2d');
        const eS = document.getElementById('energy');

        function simulate() {
            const E0 = parseInt(eS.value);
            const thick_nm = 1000; 
            const beamX = canvas.width / 2;
            const resTop = 50;
            const resHeight = thick_nm / 10; 
            const subTop = resTop + resHeight;

            document.getElementById('eLab').innerText = `Beam Energy: ${E0} keV`;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const spreadFactor = 10 + (Math.pow(E0, 1.55) * 0.8);
            
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            let exposureGrad = ctx.createRadialGradient(beamX, resTop, 2, beamX, resTop, spreadFactor);
            exposureGrad.addColorStop(0, 'rgba(255, 255, 0, 0.8)'); 
            exposureGrad.addColorStop(0.4, 'rgba(255, 255, 0, 0.3)');
            exposureGrad.addColorStop(1, 'rgba(255, 255, 0, 0)');
            ctx.fillStyle = exposureGrad;
            ctx.fillRect(0, resTop, canvas.width, resHeight);
            ctx.restore();

            ctx.fillStyle = 'rgba(50, 50, 50, 0.7)'; 
            ctx.fillRect(0, resTop, canvas.width, resHeight); 
            ctx.fillStyle = '#050505'; 
            ctx.fillRect(0, subTop, canvas.width, canvas.height);

            const numElectrons = 100; // Slightly fewer for mobile CPU performance
            for (let i = 0; i < numElectrons; i++) {
                let x = beamX;
                let y = 10;
                let E = E0;
                let angle = Math.PI / 2; 
                
                ctx.beginPath();
                ctx.moveTo(x, y);

                while (E > 0.8 && y < canvas.height && y >= 0 && x > 0 && x < canvas.width) {
                    const inResist = y < subTop;
                    ctx.strokeStyle = inResist ? 'rgba(255, 50, 50, 0.5)' : 'rgba(80, 150, 255, 0.3)';
                    ctx.lineWidth = inResist ? 1.5 : 1.0;
                    
                    let step = 1 + (E * E) / 4000; 
                    if (!inResist) step *= 0.6;

                    let bsReduction = E < 30 ? 0.65 : 1.0;
                    let scatter = (inResist ? 0.03 : (0.45 * bsReduction)) / (E/10 + 1);
                    
                    angle += (Math.random() - 0.5) * scatter * Math.PI * 2;
                    x += Math.cos(angle) * step;
                    y += Math.sin(angle) * step;
                    
                    ctx.lineTo(x, y);
                    E -= (inResist ? 0.012 : 0.055) / (E/15 + 1) * step;
                }
                ctx.stroke();
            }
        }

        eS.addEventListener('input', simulate);
        // Initial draw
        simulate();
    </script>
</body>
</html>
