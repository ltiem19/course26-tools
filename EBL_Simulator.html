<!DOCTYPE html>
<html>
<head>
    <title>EBL: Ultimate Proximity Tool</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #050505; color: #00ff41; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .wrapper { background: #111; padding: 20px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 0 40px rgba(0,255,0,0.05); }
        canvas { background: #000; border: 1px solid #444; border-radius: 4px; }
        .controls { width: 600px; margin-top: 15px; display: flex; justify-content: center; }
        .panel { background: #1a1a1a; padding: 20px; border: 1px solid #333; width: 100%; border-radius: 10px; }
        label { font-size: 1em; color: #fff; display: block; margin-bottom: 10px; font-weight: bold; letter-spacing: 1px; }
        input { width: 100%; accent-color: #ffff00; cursor: crosshair; height: 25px; }
        .legend { font-size: 0.8em; color: #888; margin-top: 20px; text-align: center; }
        .highlight { color: #ffff00; font-weight: bold; }
    </style>
</head>
<body>
    <div class="wrapper">
        <canvas id="mcCanvas" width="600" height="600"></canvas>
        <div class="controls">
            <div class="panel">
                <label id="eLab">Beam Energy: 25 keV</label>
                <input type="range" id="energy" min="5" max="50" value="25">
                <div style="font-size: 0.75em; color: #666; margin-top: 8px;">Resist: 1000 nm (Fixed)</div>
            </div>
        </div>
        <div class="legend">
            <span style="color:#ff3232">Red: Forward Scat.</span> | 
            <span style="color:#5096ff">Blue: Backscatter</span> | 
            <span class="highlight">Yellow: Proximity Exposure (Resist Damage)</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mcCanvas');
        const ctx = canvas.getContext('2d');
        const eS = document.getElementById('energy');

        function simulate() {
            const E0 = parseInt(eS.value);
            const thick_nm = 1000; 
            const beamX = canvas.width / 2;
            const resTop = 50;
            const resHeight = thick_nm / 10; 
            const subTop = resTop + resHeight;

            document.getElementById('eLab').innerText = `Beam Energy: ${E0} keV`;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. DYNAMIC YELLOW ZONE (The "Proximity Effect" Halo)
            // Scaling logic: exponential growth to make the slider feel "heavy" at high keV
            const spreadFactor = 10 + (Math.pow(E0, 1.55) * 0.8);
            
            ctx.save();
            ctx.globalCompositeOperation = 'lighter'; // Makes overlapping colors glow
            let exposureGrad = ctx.createRadialGradient(beamX, resTop, 2, beamX, resTop, spreadFactor);
            exposureGrad.addColorStop(0, 'rgba(255, 255, 0, 0.8)'); 
            exposureGrad.addColorStop(0.4, 'rgba(255, 255, 0, 0.3)');
            exposureGrad.addColorStop(1, 'rgba(255, 255, 0, 0)');
            ctx.fillStyle = exposureGrad;
            ctx.fillRect(0, resTop, canvas.width, resHeight);
            ctx.restore();

            // 2. LAYERS
            ctx.fillStyle = 'rgba(50, 50, 50, 0.7)'; 
            ctx.fillRect(0, resTop, canvas.width, resHeight); // Resist
            ctx.fillStyle = '#050505'; 
            ctx.fillRect(0, subTop, canvas.width, canvas.height); // Substrate

            // 3. TRAJECTORIES
            const numElectrons = 120;
            for (let i = 0; i < numElectrons; i++) {
                let x = beamX;
                let y = 10;
                let E = E0;
                let angle = Math.PI / 2; 
                
                ctx.beginPath();
                ctx.moveTo(x, y);

                while (E > 0.8 && y < canvas.height && y >= 0 && x > 0 && x < canvas.width) {
                    const inResist = y < subTop;
                    ctx.strokeStyle = inResist ? 'rgba(255, 50, 50, 0.5)' : 'rgba(80, 150, 255, 0.3)';
                    ctx.lineWidth = inResist ? 1.2 : 0.8;
                    
                    let step = 1 + (E * E) / 4000; 
                    if (!inResist) step *= 0.6;

                    // Reduced BS for lower energy per request
                    let bsReduction = E < 30 ? 0.65 : 1.0;
                    let scatter = (inResist ? 0.03 : (0.45 * bsReduction)) / (E/10 + 1);
                    
                    angle += (Math.random() - 0.5) * scatter * Math.PI * 2;
                    x += Math.cos(angle) * step;
                    y += Math.sin(angle) * step;
                    
                    ctx.lineTo(x, y);
                    E -= (inResist ? 0.012 : 0.055) / (E/15 + 1) * step;
                }
                ctx.stroke();
            }
        }

        eS.oninput = simulate;
        simulate();
    </script>
</body>
</html>
