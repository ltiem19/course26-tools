<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dimensional reduction: confinement, dispersion & density of states</title>
<style>
  :root { --ink:#1e293b; --muted:#64748b; --faint:#94a3b8; --line:#e2e8f0; }
  * { box-sizing:border-box; }
  body { margin:0; padding:20px; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:var(--ink); background:#fff; }
  .wrap { max-width:820px; margin:0 auto; }
  .btns { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
  .btn { padding:7px 11px; border-radius:9px; font-size:13px; cursor:pointer; border:1px solid #cbd5e1; background:#fff; color:#334155; transition:.15s; }
  .btn:hover { border-color:#64748b; }
  .btn.on { background:#1e293b; color:#fff; border-color:#1e293b; }
  .btn.bon { background:#b91c1c; color:#fff; border-color:#b91c1c; }
  .btn b { font-weight:600; }
  .chain { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); margin-bottom:16px; }
  .chain .d.on { font-weight:700; color:var(--ink); }
  .grid { display:grid; grid-template-columns:1fr; gap:14px; }
  @media (min-width:640px){ .grid { grid-template-columns:1fr 1fr; } }
  .panel { border:1px solid var(--line); border-radius:13px; padding:12px; margin-bottom:14px; }
  .panel.struct { background:#f8fafc; }
  .ttl { font-size:13px; font-weight:600; margin-bottom:4px; }
  .ttlrow { display:flex; align-items:center; justify-content:space-between; gap:8px; }
  svg { width:100%; display:block; }
  .axes { display:flex; gap:12px; justify-content:center; margin-top:4px; font-size:12px; }
  .axes span { display:flex; align-items:center; gap:5px; }
  .dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
  .free { background:#10b981; } .quant { background:#f43f5e; }
  .dos-eq { text-align:center; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:13px; color:#1d4ed8; margin-top:4px; }
  .note { font-size:13px; color:var(--muted); margin:4px 0 2px; }
  .fine { font-size:11px; color:var(--faint); margin:0; }
</style>

<div class="wrap">
  <div class="btns" id="btns"></div>
  <div class="chain" id="chain"></div>
  <div class="grid">
    <div class="panel struct">
      <div class="ttl" id="sName"></div>
      <svg id="structSvg" viewBox="0 0 320 200"></svg>
      <div class="axes" id="axes"></div>
    </div>
    <div class="panel">
      <div class="ttl">Density of states g(E)</div>
      <svg id="dosSvg" viewBox="0 0 360 210"></svg>
      <div class="dos-eq" id="dosEq"></div>
    </div>
  </div>
  <div class="panel">
    <div class="ttl ttlrow"><span>Dispersion E(k)</span>
      <button class="btn" id="bToggle" style="display:none"></button></div>
    <svg id="energySvg" viewBox="0 0 520 285"></svg>
    <div class="note" id="eqDisp"></div>
  </div>
  <p class="note" id="note"></p>
  <p class="fine">Arbitrary units; infinite-well n&sup2; subband spacing; energies measured from each system&rsquo;s lowest subband. Dispersion rings are representative; the DOS shows the full Landau ladder (panels not to a common &#295;&omega;_c scale).</p>
</div>

<script>
const DIMS = [
  { d:3, name:"3D bulk",         box:{W:110,D:110,H:110}, free:[1,1,1], eq:"g(E) \u221d \u221aE",
    disp:"E(k) = \u0127\u00b2(k\u2093\u00b2+k\u1d67\u00b2+k\u1d22\u00b2)/2m \u2014 spherical Fermi surface",
    note:"3 free directions \u2014 continuous parabolic bands" },
  { d:2, name:"2D electron gas", box:{W:150,D:120,H:16},  free:[1,1,0], eq:"g(E) = const  (staircase)",
    disp:"E(k\u2093,k\u1d67) = E\u2099 + \u0127\u00b2(k\u2093\u00b2+k\u1d67\u00b2)/2m.  Toggle B: each subband quantizes into Landau levels E\u2099+\u0127\u03c9_c(l+\u00bd) \u2014 concentric circles in k-space.",
    note:"confined in z (well width L_z); free in x, y" },
  { d:1, name:"1D quantum wire", box:{W:175,D:20,H:16},   free:[1,0,0], eq:"g(E) \u221d 1/\u221a(E\u2212E\u2099)  (van Hove)",
    disp:"\u2014  (covered in lecture)", note:"confined in y, z; free in x" },
  { d:0, name:"0D quantum dot",  box:{W:34,D:30,H:30},    free:[0,0,0], eq:"g(E) = \u03a3 \u03b4(E\u2212E\u2099)  (discrete)",
    disp:"\u2014  (covered in lecture)", note:"confined in all directions \u2014 atom-like levels" },
];
const EDGES_2D = [0,3];                       // two subbands only
const E2D_LBL = ["E\u2080","E\u2081"];
const E2D_COL = ["#2563eb","#0891b2"];        // E0 blue, E1 teal
const EDGES_1D = [{E:0,m:1},{E:3,m:2},{E:6,m:1},{E:8,m:2}];
const LEVELS_0D = [0,3,6,8,9];
const EMAX = 9, AX = ["x","y","z"];
const DISP_WC = 3, DOS_WC = 0.5;              // E1=3 = 6\u00d7DOS_WC \u2192 the two combs coincide (no interleaving)
const L=42, R=348, T=18, baseY=196, pW=R-L, pH=baseY-T;
const xOf = E => L + (E/EMAX)*pW;
const yOf = g => baseY - g*pH*0.92;
let dim = 3, bOn = false, BF = false;

/* ---------- structure ---------- */
function isoBox(b){
  const dxd=b.D*0.5, dyd=-b.D*0.32;
  const ox=(320-(b.W+dxd))/2, oy=130+b.H/2;
  const A=[ox,oy],B=[ox+b.W,oy],C=[ox+b.W,oy-b.H],Dt=[ox,oy-b.H];
  const A2=[ox+dxd,oy+dyd],B2=[ox+b.W+dxd,oy+dyd],C2=[ox+b.W+dxd,oy-b.H+dyd],D2=[ox+dxd,oy-b.H+dyd];
  const p=pts=>pts.map(q=>q.join(",")).join(" ");
  const poly=(pts,f)=>`<polygon points="${p(pts)}" fill="${f}" stroke="#5a6470" stroke-width="1"/>`;
  return poly([B,C,C2,B2],"#8d97a7")+poly([Dt,C,C2,D2],"#d8dee7")+poly([A,B,C,Dt],"#b9c2cf");
}
function renderStruct(cfg){
  let s=isoBox(cfg.box);
  if(BF){
    s=`<defs><marker id="bh" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1 L8 5 L2 9" fill="none" stroke="#b91c1c" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`+s;
    s+=`<line x1="205" y1="152" x2="205" y2="60" stroke="#b91c1c" stroke-width="2" marker-end="url(#bh)"/>`;
    s+=`<text x="213" y="72" font-size="14" font-weight="600" fill="#b91c1c">B</text>`;
  }
  document.getElementById("structSvg").innerHTML=s;
}

/* ---------- DOS ---------- */
function areaPath(pts){
  return `M ${pts[0][0]},${baseY} `+pts.map(p=>`L ${p[0]},${p[1]}`).join(" ")+` L ${pts[pts.length-1][0]},${baseY} Z`;
}
function buildCurve(){
  if(dim===2 && BF){
    let bars=[]; const h=0.42, E1=EDGES_2D[1];   // equal degeneracy per LL; coincident combs \u2192 DOS doubles above E1
    for(let l=0;;l++){ const E=DOS_WC*(l+0.5); if(E>EMAX) break;
      bars.push({x:xOf(E),g0:0,g:h,c:E2D_COL[0]});                       // E0 ladder (always)
      if(E>E1+1e-6) bars.push({x:xOf(E),g0:h,g:2*h,c:E2D_COL[1]});       // E1 ladder, stacked on top
    }
    return {type:"bars",bars,legend:true};
  }
  if(dim===3){
    let pts=[]; for(let i=0;i<=120;i++){const E=i/120*EMAX; pts.push([xOf(E),yOf(Math.sqrt(E/EMAX))]);}
    return {type:"area",pts};
  }
  if(dim===2){
    const maxC=EDGES_2D.length; let pts=[[xOf(0),yOf(0)]];
    for(const e of EDGES_2D){
      const before=EDGES_2D.filter(x=>x<e).length;
      pts.push([xOf(e),yOf(before/maxC)]); pts.push([xOf(e),yOf((before+1)/maxC)]);
    }
    pts.push([xOf(EMAX),yOf(1)]);
    return {type:"area",pts,edges:EDGES_2D};
  }
  if(dim===1){
    const REF=7; let pts=[];
    for(let i=0;i<EDGES_1D.length;i++){
      const e=EDGES_1D[i].E, next=(i+1<EDGES_1D.length)?EDGES_1D[i+1].E:EMAX;
      pts.push([xOf(e),T]);
      const start=e+0.25, end=next-0.02, N=40;
      for(let s=0;s<=N;s++){
        const E=start+(end-start)*s/N; let g=0;
        for(let j=0;j<=i;j++) g+=EDGES_1D[j].m/Math.sqrt(E-EDGES_1D[j].E);
        pts.push([xOf(E),yOf(Math.min(g/REF,0.95))]);
      }
    }
    return {type:"area",pts,edges:EDGES_1D.map(s=>s.E)};
  }
  return {type:"bars",bars:LEVELS_0D.map(E=>({x:xOf(E),g:0.85,c:"#2563eb"}))};
}
function renderDOS(){
  const c=buildCurve(); let s="";
  if(c.edges) for(const e of c.edges)
    s+=`<line x1="${xOf(e)}" y1="${T}" x2="${xOf(e)}" y2="${baseY}" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 3"/>`;
  s+=`<line x1="${L}" y1="${baseY}" x2="${R}" y2="${baseY}" stroke="#334155" stroke-width="1.2"/>`;
  s+=`<line x1="${L}" y1="${baseY}" x2="${L}" y2="${T}" stroke="#334155" stroke-width="1.2"/>`;
  s+=`<text x="${R}" y="${baseY+16}" font-size="11" text-anchor="end" fill="#475569">E \u2192</text>`;
  s+=`<text x="${L-6}" y="${T+2}" font-size="11" text-anchor="end" fill="#475569">g(E)</text>`;
  if(c.type==="area"){
    s+=`<path d="${areaPath(c.pts)}" fill="#3b82f6" fill-opacity="0.18"/>`;
    s+=`<polyline points="${c.pts.map(p=>p.join(",")).join(" ")}" fill="none" stroke="#2563eb" stroke-width="2" stroke-linejoin="round"/>`;
  } else {
    for(const b of c.bars){
      s+=`<line x1="${b.x}" y1="${yOf(b.g0||0)}" x2="${b.x}" y2="${yOf(b.g)}" stroke="${b.c}" stroke-width="2.4"/>`;
    }
  }
  if(dim===2 && !BF){
    const tops=[1/2,1];
    EDGES_2D.forEach((e,n)=>{ s+=`<text x="${xOf(e)+4}" y="${yOf(tops[n])-5}" font-size="11" fill="#1d4ed8">${E2D_LBL[n]}</text>`; });
  }
  if(c.legend){
    s+=`<rect x="226" y="26" width="10" height="6" fill="#2563eb"/><text x="240" y="32" font-size="10" fill="#475569">E\u2080 levels</text>`;
    s+=`<rect x="298" y="26" width="10" height="6" fill="#0891b2"/><text x="312" y="32" font-size="10" fill="#475569">E\u2081 (stacked)</text>`;
  }
  document.getElementById("dosSvg").innerHTML=s;
}

/* ---------- dispersion ---------- */
const ARROW = `<defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1 L8 5 L2 9" fill="none" stroke="#334155" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`;
const axis=(x1,y1,x2,y2)=>`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#334155" stroke-width="1.2" marker-end="url(#ah)"/>`;
function bowl(cx,vy,topY,Rx,fr,stroke,sw,dash){
  const H=vy-topY; let lp=[],rp=[];
  for(let i=0;i<=24;i++){const r=Rx*i/24, y=vy-H*(r/Rx)*(r/Rx); lp.push((cx-r).toFixed(1)+","+y.toFixed(1)); rp.push((cx+r).toFixed(1)+","+y.toFixed(1));}
  const da=dash?` stroke-dasharray="4 3"`:``;
  return `<polyline points="${lp.join(" ")}" fill="none" stroke="${stroke}" stroke-width="${sw}"${da}/>`
       + `<polyline points="${rp.join(" ")}" fill="none" stroke="${stroke}" stroke-width="${sw}"${da}/>`
       + `<ellipse cx="${cx}" cy="${topY}" rx="${Rx.toFixed(1)}" ry="${(Rx*fr).toFixed(1)}" fill="none" stroke="${stroke}" stroke-width="${sw}"${da}/>`;
}
function renderEnergy(){
  let s=ARROW;
  if(dim===3){
    const O=[260,150], r=58;
    s+=`<ellipse cx="${O[0]}" cy="${O[1]}" rx="${r}" ry="${r}" fill="#3b82f6" fill-opacity="0.12" stroke="#2563eb" stroke-width="1.5"/>`;
    s+=`<ellipse cx="${O[0]}" cy="${O[1]}" rx="${r}" ry="18" fill="none" stroke="#2563eb" stroke-width="1" stroke-dasharray="4 3" opacity="0.7"/>`;
    s+=axis(O[0],O[1],O[0],62)+`<text x="${O[0]+6}" y="60" font-size="12" fill="#334155">k\u1d22</text>`;
    s+=axis(O[0],O[1],172,212)+`<text x="160" y="224" font-size="12" fill="#334155">k\u2093</text>`;
    s+=axis(O[0],O[1],360,196)+`<text x="366" y="202" font-size="12" fill="#334155">k\u1d67</text>`;
    s+=`<circle cx="${O[0]}" cy="${O[1]}" r="2.5" fill="#334155"/>`;
    s+=`<text x="260" y="262" font-size="12" text-anchor="middle" fill="#64748b">Fermi sphere: E(k) \u221d k\u2093\u00b2+k\u1d67\u00b2+k\u1d22\u00b2</text>`;
  } else if(dim===2){
    const cx=260, O=235, sc=15, topE=12, topY=O-sc*topE, fr=0.32, Kr=150/Math.sqrt(topE);
    s+=`<text x="${cx}" y="34" font-size="12" text-anchor="middle" fill="${BF?'#b91c1c':'#334155'}">${BF?'B \u2260 0 \u2014 Landau quantized':'B = 0'}</text>`;
    s+=axis(cx,O,cx,48)+`<text x="${cx-10}" y="52" font-size="12" text-anchor="end" fill="#334155">E</text>`;
    s+=axis(cx,O,170,266)+`<text x="158" y="266" font-size="12" fill="#334155">k\u2093</text>`;
    s+=axis(cx,O,350,266)+`<text x="356" y="264" font-size="12" fill="#334155">k\u1d67</text>`;
    EDGES_2D.forEach((En,n)=>{
      const vy=O-sc*En, Rx=Kr*Math.sqrt(topE-En);
      if(BF){
        s+=bowl(cx,vy,topY,Rx,fr,"#d6dae0",1.1,true);
        for(let l=0;;l++){ const E=En+DISP_WC*(l+0.5); if(E>topE) break; const rr=Kr*Math.sqrt(E-En); if(rr<2) continue;
          s+=`<ellipse cx="${cx}" cy="${(O-sc*E).toFixed(1)}" rx="${rr.toFixed(1)}" ry="${(rr*fr).toFixed(1)}" fill="none" stroke="${E2D_COL[n]}" stroke-width="1.5"/>`; }
      } else {
        s+=bowl(cx,vy,topY,Rx,fr,E2D_COL[n],1.7,false);
      }
      s+=`<circle cx="${cx}" cy="${vy}" r="2.2" fill="${E2D_COL[n]}"/>`;
      s+=`<text x="${cx-8}" y="${vy+4}" font-size="11" text-anchor="end" fill="#1d4ed8">${E2D_LBL[n]}</text>`;
    });
    if(BF){
      const y0=O-sc*(DISP_WC*0.5), y1=O-sc*(DISP_WC*1.5), bxx=cx+20;
      s+=`<line x1="${bxx}" y1="${y0}" x2="${bxx}" y2="${y1}" stroke="#334155" stroke-width="1"/>`;
      s+=`<line x1="${bxx-4}" y1="${y0}" x2="${bxx+4}" y2="${y0}" stroke="#334155" stroke-width="1"/>`;
      s+=`<line x1="${bxx-4}" y1="${y1}" x2="${bxx+4}" y2="${y1}" stroke="#334155" stroke-width="1"/>`;
      s+=`<text x="${bxx+7}" y="${(y0+y1)/2+4}" font-size="11" fill="#334155">\u0127\u03c9_c</text>`;
    }
  } else {
    s+=`<text x="260" y="150" font-size="14" text-anchor="middle" fill="#94a3b8">dispersion covered in lecture</text>`;
  }
  document.getElementById("energySvg").innerHTML=s;
}

/* ---------- main ---------- */
function render(){
  const cfg=DIMS.find(x=>x.d===dim);
  BF = (dim===2 && bOn);
  const free = BF ? [0,0,0] : cfg.free;

  document.getElementById("btns").innerHTML=DIMS.map(x=>
    `<button class="btn ${x.d===dim?"on":""}" data-d="${x.d}"><b>${x.d}D</b> &middot; ${x.name.replace(/^\dD\s*/,"")}</button>`).join("");
  document.getElementById("chain").innerHTML=[3,2,1,0].map((d,i)=>
    `<span class="d ${d===dim?"on":""}">${d}D</span>`+(i<3?`<span>&rarr;</span>`:``)).join("")
    +`<span style="margin-left:8px">increasing confinement</span>`;

  const bt=document.getElementById("bToggle");
  if(dim===2){ bt.style.display="inline-block"; bt.textContent="Magnetic field B: "+(bOn?"on":"off"); bt.className="btn"+(bOn?" bon":""); }
  else bt.style.display="none";

  document.getElementById("sName").textContent=cfg.name;
  renderStruct(cfg);
  document.getElementById("axes").innerHTML=free.map((f,i)=>
    `<span><span class="dot ${f?"free":"quant"}"></span>${AX[i]}: ${f?"free":"quantized"}</span>`).join("");
  document.getElementById("dosEq").textContent = BF ? "g(E) = \u03a3 \u03b4(E\u2212E\u2099,\u2097)  (Landau levels)" : cfg.eq;
  document.getElementById("eqDisp").textContent=cfg.disp;
  document.getElementById("note").textContent = (BF ? "confined in z; with B the in-plane motion is also quantized (Landau levels) \u2014 all directions quantized" : cfg.note)+".";
  renderDOS(); renderEnergy();

  document.querySelectorAll(".btn[data-d]").forEach(b=>b.onclick=()=>{dim=+b.dataset.d; render();});
  bt.onclick=()=>{ bOn=!bOn; render(); };
}
render();
</script>
