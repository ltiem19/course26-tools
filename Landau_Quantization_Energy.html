<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e1a">
<title>Cyclotron + disorder</title>
<style>
:root {
  --bg: #0a0e1a;
  --panel: #131929;
  --border: #1f2942;
  --text: #e8ecf4;
  --muted: #8893a8;
  --accent: #6ad0ff;
  --accent-dim: #3a7ba0;
}
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  overscroll-behavior: none;
}
body {
  padding: 12px;
  min-height: 100vh;
  min-height: 100dvh;
}
.container {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  gap: 12px;
}
@media (min-width: 820px) {
  .container { grid-template-columns: 1fr 280px; align-items: start; }
}
.left-column {
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-width: 0;
}
.canvas-wrap {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px;
  position: relative;
}
canvas {
  display: block;
  width: 100%;
  height: auto;
  background: #0a0e1a;
  border-radius: 4px;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}
.legend {
  position: absolute;
  top: 14px;
  right: 14px;
  font-size: 11px;
  color: var(--muted);
  background: rgba(10, 14, 26, 0.72);
  padding: 6px 9px;
  border-radius: 4px;
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 3px;
  pointer-events: none;
}
.legend .dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
}
.controls {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.title {
  font-size: 14px;
  font-weight: 600;
}
.subtitle {
  font-size: 11px;
  color: var(--muted);
  margin-top: 3px;
  line-height: 1.4;
}
.control-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.label-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 12px;
}
.label-name { color: var(--muted); }
.label-value {
  color: var(--accent);
  font-family: 'SF Mono', Menlo, Consolas, monospace;
  font-size: 13px;
}
input[type="range"] {
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
  height: 6px;
  background: #2a3550;
  border-radius: 3px;
  outline: none;
  touch-action: manipulation;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 22px;
  height: 22px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 0 8px rgba(106, 208, 255, 0.5);
  border: none;
}
input[type="range"]::-moz-range-thumb {
  width: 22px;
  height: 22px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
  border: none;
  box-shadow: 0 0 8px rgba(106, 208, 255, 0.5);
}
button {
  background: #1f2942;
  color: var(--text);
  border: 1px solid var(--border);
  padding: 10px 8px;
  min-height: 44px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  flex: 1;
  touch-action: manipulation;
}
button:active { background: #2a3a5a; border-color: var(--accent-dim); }
@media (hover: hover) {
  button:hover { background: #2a3a5a; border-color: var(--accent-dim); }
}
.button-row {
  display: flex;
  gap: 8px;
}
</style>
</head>
<body>
<div class="container">
  <div class="left-column">
    <div class="canvas-wrap">
      <canvas id="canvas"></canvas>
      <div class="legend">
        <div><span class="dot" style="background:#7cdcff"></span>electron</div>
        <div><span class="dot" style="background:#ff6448"></span>scatterer</div>
        <div>⊙ B out of page</div>
      </div>
    </div>
    <div class="canvas-wrap">
      <canvas id="energy-canvas"></canvas>
      <div class="legend">
        <div>E(kₓ,kᵧ) Quantization & Top View</div>
      </div>
    </div>
  </div>
  <div class="controls">
    <div>
      <div class="title">Cyclotron + disorder</div>
      <div class="subtitle">Tap canvas to place the electron. Hard walls → skipping orbits at the edges.</div>
    </div>
    <div class="control-group">
      <div class="label-row">
        <span class="label-name">Magnetic field B</span>
        <span class="label-value" id="b-value">0.00</span>
      </div>
      <input type="range" id="b-slider" min="0" max="8" step="0.05" value="0">
    </div>
    <div class="control-group">
      <div class="label-row">
        <span class="label-name">Scatterer density n<sub>imp</sub></span>
        <span class="label-value" id="n-value">0</span>
      </div>
      <input type="range" id="n-slider" min="0" max="120" step="1" value="0">
    </div>
    <div class="button-row">
      <button id="pause-btn">Pause</button>
      <button id="reset-btn">Reset</button>
      <button id="trail-btn">Trail: long</button>
    </div>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const energyCanvas = document.getElementById('energy-canvas');
const eCtx = energyCanvas.getContext('2d');

const W = 700;
const H = 500;
const EW = 700;
const EH = 450;
const wallPad = 6;

function setupCanvas() {
  const dpr = window.devicePixelRatio || 1;
  
  canvas.width = Math.floor(W * dpr);
  canvas.height = Math.floor(H * dpr);
  canvas.style.aspectRatio = W + ' / ' + H;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);

  energyCanvas.width = Math.floor(EW * dpr);
  energyCanvas.height = Math.floor(EH * dpr);
  energyCanvas.style.aspectRatio = EW + ' / ' + EH;
  eCtx.setTransform(1, 0, 0, 1, 0, 0);
  eCtx.scale(dpr, dpr);
}
setupCanvas();

let B = 0;
let nDefects = 0;
let defects = [];
let electron = null; 
let trail = [];
let trailMaxLen = 700;
let trailMode = 'long';
let scatterCooldown = 0;
let defectFlashes = new Map();
let isPaused = false;

const speedScale = 150;
const scatterRadius = 9;
const baseDt = 1/60;
const substeps = 4;
const dt = baseDt / substeps;

const gridSteps = 26; 
const maxEnergyVal = 210; 
const EFermi = 115; 

function regenerateDefects() {
  defects = [];
  if (electron === null) {
    defectFlashes = new Map();
    return;
  }
  for (let i = 0; i < nDefects; i++) {
    let attempts = 0;
    let d;
    do {
      d = {
        x: 25 + Math.random() * (W - 50),
        y: 25 + Math.random() * (H - 50),
      };
      attempts++;
    } while (
      attempts < 10 &&
      Math.hypot(d.x - electron.x, d.y - electron.y) < 50
    );
    defects.push(d);
  }
  defectFlashes = new Map();
}

function placeElectron(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const sx = W / rect.width;
  const sy = H / rect.height;
  let x = (clientX - rect.left) * sx;
  let y = (clientY - rect.top) * sy;
  x = Math.max(wallPad + 3, Math.min(W - wallPad - 3, x));
  y = Math.max(wallPad + 3, Math.min(H - wallPad - 3, y));
  
  electron = { x: x, y: y, vx: 0, vy: 0 };
  const angle = Math.random() * 2 * Math.PI;
  electron.vx = Math.cos(angle);
  electron.vy = Math.sin(angle);
  trail = [];
  scatterCooldown = 0;
  
  regenerateDefects();
}

function reset() {
  electron = null;
  trail = [];
  scatterCooldown = 0;
  regenerateDefects();
}

function step() {
  if (electron === null) return;
  scatterCooldown -= dt;

  const dtheta = B * dt;
  if (dtheta !== 0) {
    const c = Math.cos(dtheta);
    const s = Math.sin(dtheta);
    const nvx = c * electron.vx - s * electron.vy;
    const nvy = s * electron.vx + c * electron.vy;
    electron.vx = nvx;
    electron.vy = nvy;
  }

  electron.x += electron.vx * speedScale * dt;
  electron.y += electron.vy * speedScale * dt;

  const xMin = wallPad, xMax = W - wallPad;
  const yMin = wallPad, yMax = H - wallPad;
  if (electron.x < xMin) {
    electron.x = 2 * xMin - electron.x;
    electron.vx = -electron.vx;
  } else if (electron.x > xMax) {
    electron.x = 2 * xMax - electron.x;
    electron.vx = -electron.vx;
  }
  if (electron.y < yMin) {
    electron.y = 2 * yMin - electron.y;
    electron.vy = -electron.vy;
  } else if (electron.y > yMax) {
    electron.y = 2 * yMax - electron.y;
    electron.vy = -electron.vy;
  }

  trail.push({ x: electron.x, y: electron.y });
  const cap = trailMode === 'long' ? trailMaxLen : 120;
  while (trail.length > cap) trail.shift();

  if (scatterCooldown <= 0) {
    for (let i = 0; i < defects.length; i++) {
      const d = defects[i];
      const dx = electron.x - d.x;
      const dy = electron.y - d.y;
      if (dx*dx + dy*dy < scatterRadius * scatterRadius) {
        const angle = Math.random() * 2 * Math.PI;
        electron.vx = Math.cos(angle);
        electron.vy = Math.sin(angle);
        scatterCooldown = 0.04;
        defectFlashes.set(d, 0.35);
        break;
      }
    }
  }
}

function render() {
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = '#141c2e';
  ctx.lineWidth = 0.5;
  for (let i = 50; i < W; i += 50) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke();
  }
  for (let i = 50; i < H; i += 50) {
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke();
  }

  ctx.strokeStyle = '#3a4868';
  ctx.lineWidth = 2;
  ctx.strokeRect(wallPad, wallPad, W - 2 * wallPad, H - 2 * wallPad);

  const fieldAlpha = Math.min(0.35, 0.06 + B * 0.04);
  ctx.strokeStyle = 'rgba(120, 170, 230, ' + fieldAlpha + ')';
  ctx.fillStyle = 'rgba(120, 170, 230, ' + fieldAlpha + ')';
  ctx.lineWidth = 1;
  for (let i = 60; i < W - 30; i += 100) {
    for (let j = 60; j < H - 30; j += 100) {
      ctx.beginPath(); ctx.arc(i, j, 6, 0, 2 * Math.PI); ctx.stroke();
      ctx.beginPath(); ctx.arc(i, j, 1.5, 0, 2 * Math.PI); ctx.fill();
    }
  }

  for (let i = 0; i < defects.length; i++) {
    const d = defects[i];
    let flash = defectFlashes.get(d) || 0;
    if (flash > 0) {
      flash -= baseDt;
      if (flash <= 0) defectFlashes.delete(d);
      else defectFlashes.set(d, flash);
    }
    const grad = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, scatterRadius * 1.8);
    const intensity = 0.25 + flash * 2.0;
    grad.addColorStop(0, 'rgba(255, 110, 80, ' + Math.min(0.65, intensity) + ')');
    grad.addColorStop(1, 'rgba(255, 110, 80, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(d.x, d.y, scatterRadius * 1.8, 0, 2 * Math.PI);
    ctx.fill();
    ctx.fillStyle = flash > 0 ? '#ffd09a' : '#ff6448';
    ctx.beginPath();
    ctx.arc(d.x, d.y, 2.5, 0, 2 * Math.PI);
    ctx.fill();
  }

  if (electron === null) {
    ctx.fillStyle = 'rgba(106, 208, 255, 0.7)';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Tap to place the electron and initiate simulation', W / 2, H / 2);
    ctx.textAlign = 'left';
    return;
  }

  ctx.lineWidth = 1.8;
  ctx.lineCap = 'round';
  const L = trail.length;
  for (let i = 1; i < L; i++) {
    const p0 = trail[i - 1];
    const p1 = trail[i];
    const alpha = (i / L) * 0.85;
    ctx.strokeStyle = 'rgba(124, 220, 255, ' + alpha + ')';
    ctx.beginPath();
    ctx.moveTo(p0.x, p0.y);
    ctx.lineTo(p1.x, p1.y);
    ctx.stroke();
  }

  const gsize = 16;
  const eg = ctx.createRadialGradient(electron.x, electron.y, 0, electron.x, electron.y, gsize);
  eg.addColorStop(0, 'rgba(200, 245, 255, 1)');
  eg.addColorStop(0.35, 'rgba(124, 220, 255, 0.55)');
  eg.addColorStop(1, 'rgba(80, 150, 255, 0)');
  ctx.fillStyle = eg;
  ctx.beginPath();
  ctx.arc(electron.x, electron.y, gsize, 0, 2 * Math.PI);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(electron.x, electron.y, 3.5, 0, 2 * Math.PI);
  ctx.fill();

  ctx.strokeStyle = 'rgba(255, 255, 255, 0.55)';
  ctx.lineWidth = 1.5;
  const aLen = 14;
  const tipX = electron.x + electron.vx * aLen;
  const tipY = electron.y + electron.vy * aLen;
  ctx.beginPath();
  ctx.moveTo(electron.x, electron.y);
  ctx.lineTo(tipX, tipY);
  ctx.stroke();
  const headAng = Math.atan2(electron.vy, electron.vx);
  const hs = 4;
  ctx.beginPath();
  ctx.moveTo(tipX, tipY);
  ctx.lineTo(tipX - hs * Math.cos(headAng - 0.4), tipY - hs * Math.sin(headAng - 0.4));
  ctx.moveTo(tipX, tipY);
  ctx.lineTo(tipX - hs * Math.cos(headAng + 0.4), tipY - hs * Math.sin(headAng + 0.4));
  ctx.stroke();
}

function renderEnergy() {
  eCtx.fillStyle = '#0a0e1a';
  eCtx.fillRect(0, 0, EW, EH);

  const X0 = EW / 2 - 90;
  const Y0 = EH - 80;

  function project(kx, ky, E) {
    const isoX = kx - ky * 0.7;
    const isoY = -E + ky * 0.35;
    return { x: X0 + isoX, y: Y0 + isoY };
  }

  const kMax = 160;
  const cCoeff = maxEnergyVal / (kMax * kMax);
  const energyScale = 22;

  if (B === 0) {
    eCtx.lineWidth = 1;
    for (let i = 0; i <= gridSteps; i++) {
      const kx = -kMax + (2 * kMax * i) / gridSteps;
      eCtx.beginPath();
      let first = true;
      for (let j = 0; j <= gridSteps; j++) {
        const ky = -kMax + (2 * kMax * j) / gridSteps;
        const E = cCoeff * (kx * kx + ky * ky);
        if (E <= maxEnergyVal) {
          const pt = project(kx, ky, E);
          if (first) { eCtx.moveTo(pt.x, pt.y); first = false; }
          else { eCtx.lineTo(pt.x, pt.y); }
        }
      }
      eCtx.strokeStyle = 'rgba(255, 51, 51, 0.28)';
      eCtx.stroke();
    }

    for (let j = 0; j <= gridSteps; j++) {
      const ky = -kMax + (2 * kMax * j) / gridSteps;
      eCtx.beginPath();
      let first = true;
      for (let i = 0; i <= gridSteps; i++) {
        const kx = -kMax + (2 * kMax * i) / gridSteps;
        const E = cCoeff * (kx * kx + ky * ky);
        if (E <= maxEnergyVal) {
          const pt = project(kx, ky, E);
          if (first) { eCtx.moveTo(pt.x, pt.y); first = false; }
          else { eCtx.lineTo(pt.x, pt.y); }
        }
      }
      eCtx.strokeStyle = 'rgba(255, 51, 51, 0.28)';
      eCtx.stroke();
    }
  } else {
    eCtx.strokeStyle = '#ff3333';
    eCtx.lineWidth = 3.5;

    let N = 0;
    while (true) {
      const energyFactor = (N + 0.5) * B;
      const levelEnergy = energyFactor * energyScale;
      
      if (levelEnergy > maxEnergyVal + 20) break;

      const currentRadiusK = Math.sqrt(levelEnergy / cCoeff);
      eCtx.beginPath();

      const ringSegments = 72;
      for (let s = 0; s <= ringSegments; s++) {
        const theta = (s * 2 * Math.PI) / ringSegments;
        const kx = currentRadiusK * Math.cos(theta);
        const ky = currentRadiusK * Math.sin(theta);
        const pt = project(kx, ky, levelEnergy);
        if (s === 0) eCtx.moveTo(pt.x, pt.y);
        else eCtx.lineTo(pt.x, pt.y);
      }
      eCtx.stroke();

      if (B >= 1.0) {
        const labelPt = project(-currentRadiusK, 0, levelEnergy);
        eCtx.fillStyle = '#8893a8';
        eCtx.font = '13px sans-serif';
        eCtx.fillText(`N = ${N}`, labelPt.x - 45, labelPt.y + 4);
      }

      N++;
    }

    if (B >= 1.0) {
      const e0 = (0.5 * B) * energyScale;
      const e1 = (1.5 * B) * energyScale;
      
      if (e1 <= maxEnergyVal) {
        const r1 = Math.sqrt(e1 / cCoeff);
        const bPt0 = project(r1, 0, e0);
        const bPt1 = project(r1, 0, e1);
        const bracketX = Math.max(bPt0.x, bPt1.x) + 20;

        eCtx.strokeStyle = '#8893a8';
        eCtx.lineWidth = 1.2;
        eCtx.beginPath();
        eCtx.moveTo(bracketX - 4, bPt0.y);
        eCtx.lineTo(bracketX, bPt0.y);
        eCtx.lineTo(bracketX, bPt1.y);
        eCtx.lineTo(bracketX - 4, bPt1.y);
        eCtx.stroke();

        eCtx.fillStyle = '#e8ecf4';
        eCtx.font = '14px sans-serif';
        eCtx.fillText('Δε_{ΔN=1} = ħ (eB / m*)', bracketX + 12, (bPt0.y + bPt1.y) / 2 + 5);
      }
    }
  }

  const rFermiK = Math.sqrt(EFermi / cCoeff);
  eCtx.fillStyle = 'rgba(106, 208, 255, 0.14)';
  eCtx.strokeStyle = 'rgba(106, 208, 255, 0.5)';
  eCtx.lineWidth = 1;
  eCtx.beginPath();
  
  const planeSegments = 72;
  for (let s = 0; s <= planeSegments; s++) {
    const theta = (s * 2 * Math.PI) / planeSegments;
    const kx = rFermiK * Math.cos(theta);
    const ky = rFermiK * Math.sin(theta);
    const pt = project(kx, ky, EFermi);
    if (s === 0) eCtx.moveTo(pt.x, pt.y);
    else eCtx.lineTo(pt.x, pt.y);
  }
  eCtx.fill();
  eCtx.stroke();

  const edgeLabelPt = project(rFermiK, 0, EFermi);
  eCtx.fillStyle = '#6ad0ff';
  eCtx.font = '12px sans-serif';
  eCtx.fillText('E_F (Fermi Level)', edgeLabelPt.x + 8, edgeLabelPt.y + 4);

  eCtx.strokeStyle = '#3a4868';
  eCtx.lineWidth = 1.5;
  eCtx.fillStyle = '#e8ecf4';
  eCtx.font = 'italic 15px sans-serif';

  const axisE_top = project(0, 0, maxEnergyVal + 30);
  const axisE_bot = project(0, 0, 0);
  eCtx.beginPath();
  eCtx.moveTo(axisE_bot.x, axisE_bot.y);
  eCtx.lineTo(axisE_top.x, axisE_top.y);
  eCtx.stroke();
  eCtx.beginPath();
  eCtx.moveTo(axisE_top.x - 4, axisE_top.y + 10);
  eCtx.lineTo(axisE_top.x, axisE_top.y);
  eCtx.lineTo(axisE_top.x + 4, axisE_top.y + 10);
  eCtx.stroke();
  eCtx.fillText('E', axisE_top.x - 18, axisE_top.y + 6);

  const axisKx_end = project(kMax + 30, 0, 0);
  eCtx.beginPath();
  eCtx.moveTo(axisE_bot.x, axisE_bot.y);
  eCtx.lineTo(axisKx_end.x, axisKx_end.y);
  eCtx.stroke();
  eCtx.fillText('kₓ', axisKx_end.x + 8, axisKx_end.y + 4);

  const axisKy_end = project(0, kMax + 35, 0);
  eCtx.beginPath();
  eCtx.moveTo(axisE_bot.x, axisE_bot.y);
  eCtx.lineTo(axisKy_end.x, axisKy_end.y);
  eCtx.stroke();
  eCtx.fillText('kᵧ', axisKy_end.x - 18, axisKy_end.y + 12);

  if (B === 0) {
    eCtx.fillStyle = '#8893a8';
    eCtx.font = '14px sans-serif';
    eCtx.fillText('B = 0: Continuous Paraboloid State Spectrum', X0 - 110, Y0 + 45);
  }

  const viewW = 150;
  const viewH = 150;
  const viewX0 = EW - viewW - 25;
  const viewY0 = 30;

  eCtx.fillStyle = 'rgba(19, 25, 41, 0.65)';
  eCtx.strokeStyle = '#1f2942';
  eCtx.lineWidth = 1;
  eCtx.fillRect(viewX0, viewY0, viewW, viewH);
  eCtx.strokeRect(viewX0, viewY0, viewW, viewH);

  const cx = viewX0 + viewW / 2;
  const cy = viewY0 + viewH / 2;
  const topViewKScale = 0.38; 

  eCtx.strokeStyle = 'rgba(58, 72, 104, 0.5)';
  eCtx.lineWidth = 1;
  eCtx.beginPath();
  eCtx.moveTo(viewX0 + 8, cy); eCtx.lineTo(viewX0 + viewW - 8, cy);
  eCtx.moveTo(cx, viewY0 + 8); eCtx.lineTo(cx, viewY0 + viewH - 8);
  eCtx.stroke();

  eCtx.fillStyle = '#8893a8';
  eCtx.font = '11px sans-serif';
  eCtx.fillText('kₓ', viewX0 + viewW - 15, cy + 13);
  eCtx.fillText('kᵧ', cx - 14, viewY0 + 15);

  const rFermiScreen = rFermiK * topViewKScale;

  eCtx.strokeStyle = '#6ad0ff';
  eCtx.lineWidth = 1.5;
  eCtx.setLineDash([4, 3]);
  eCtx.beginPath();
  eCtx.arc(cx, cy, rFermiScreen, 0, 2 * Math.PI);
  eCtx.stroke();
  eCtx.setLineDash([]); 

  eCtx.fillStyle = '#6ad0ff';
  eCtx.font = '10px sans-serif';
  eCtx.fillText('E_F', cx + rFermiScreen * Math.cos(-0.5) + 3, cy + rFermiScreen * Math.sin(-0.5));

  if (B === 0) {
    eCtx.fillStyle = 'rgba(255, 51, 51, 0.12)';
    eCtx.beginPath();
    eCtx.arc(cx, cy, rFermiScreen, 0, 2 * Math.PI);
    eCtx.fill();
  } else {
    let N = 0;
    eCtx.lineWidth = 2.5;
    while (true) {
      const energyFactor = (N + 0.5) * B;
      const levelEnergy = energyFactor * energyScale;
      
      if (levelEnergy > maxEnergyVal) break;

      const currentRadiusK = Math.sqrt(levelEnergy / cCoeff);
      const radiusScreen = currentRadiusK * topViewKScale;

      if (levelEnergy <= EFermi) {
        eCtx.strokeStyle = '#ff3333'; 
      } else {
        eCtx.strokeStyle = 'rgba(255, 51, 51, 0.2)'; 
      }

      eCtx.beginPath();
      eCtx.arc(cx, cy, radiusScreen, 0, 2 * Math.PI);
      eCtx.stroke();

      N++;
    }
  }
}

function updateLabels() {
  document.getElementById('b-value').textContent = B.toFixed(2);
  document.getElementById('n-value').textContent = nDefects;
}

function loop() {
  if (!isPaused) {
    for (let i = 0; i < substeps; i++) step();
  }
  render();
  renderEnergy();
  requestAnimationFrame(loop);
}

document.getElementById('b-slider').addEventListener('input', function (e) {
  B = parseFloat(e.target.value);
  updateLabels();
});
document.getElementById('n-slider').addEventListener('input', function (e) {
  nDefects = parseInt(e.target.value, 10);
  regenerateDefects();
  updateLabels();
});

document.getElementById('pause-btn').addEventListener('click', function (e) {
  isPaused = !isPaused;
  e.currentTarget.textContent = isPaused ? 'Play' : 'Pause';
});
document.getElementById('reset-btn').addEventListener('click', reset);
document.getElementById('trail-btn').addEventListener('click', function (e) {
  trailMode = trailMode === 'long' ? 'short' : 'long';
  e.currentTarget.textContent = 'Trail: ' + trailMode;
});

canvas.addEventListener('pointerdown', function (e) {
  e.preventDefault();
  placeElectron(e.clientX, e.clientY);
});

window.addEventListener('resize', function () {
  setupCanvas();
});

regenerateDefects();
updateLabels();
loop();
</script>
</body>
