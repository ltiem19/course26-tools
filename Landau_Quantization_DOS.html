<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f1f5f9">
<title>Landau Quantization & Density of States</title>
<style>
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}
html, body {
  background: #f1f5f9; color: #1e293b;
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  overscroll-behavior: none;
}
body { padding: 12px; min-height: 100vh; min-height: 100dvh; }
.container {
  max-width: 1100px; margin: 0 auto;
  display: grid; gap: 12px;
}
@media (min-width: 820px) {
  .container { grid-template-columns: 1fr 260px; align-items: start; }
}
.canvas-wrap {
  background: #ffffff; border: 1px solid #cbd5e1;
  border-radius: 10px; padding: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}
canvas {
  display: block; width: 100%; height: auto;
  border-radius: 6px; touch-action: none;
  -webkit-user-select: none; user-select: none;
}
.controls {
  background: #ffffff; border: 1px solid #cbd5e1;
  border-radius: 10px; padding: 16px;
  display: flex; flex-direction: column; gap: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}
.ctrl-title  { font-size: 14px; font-weight: 700; color: #1e293b; }
.ctrl-sub    { font-size: 11px; color: #64748b; margin-top: 4px; line-height: 1.5; }
.control-group { display: flex; flex-direction: column; gap: 6px; }
.label-row   { display: flex; justify-content: space-between; align-items: baseline; font-size: 12px; }
.label-name  { color: #475569; font-weight: 500; }
.label-value {
  color: #2563eb; font-family: 'SF Mono', Menlo, Consolas, monospace;
  font-size: 13px; font-weight: 700;
  background: #eff6ff; padding: 1px 7px; border-radius: 4px;
}
input[type="range"] {
  width: 100%; -webkit-appearance: none; appearance: none;
  height: 5px; background: #e2e8f0; border-radius: 3px;
  outline: none; touch-action: manipulation;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 22px; height: 22px; background: #2563eb;
  border-radius: 50%; cursor: pointer;
  box-shadow: 0 0 0 3px #fff, 0 0 0 5px #bfdbfe; border: none;
}
input[type="range"]::-moz-range-thumb {
  width: 22px; height: 22px; background: #2563eb;
  border-radius: 50%; cursor: pointer;
  border: 2px solid #fff; box-shadow: 0 0 0 3px #bfdbfe;
}
.checkbox-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: #1e293b; cursor: pointer;
  user-select: none; padding: 4px 0; font-weight: 500;
}
.checkbox-row input[type="checkbox"] {
  width: 16px; height: 16px; accent-color: #2563eb; cursor: pointer;
}
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">
  <div class="canvas-wrap">
    <canvas id="display-canvas"></canvas>
  </div>
  <div class="controls">
    <div>
      <div class="ctrl-title">Landau Quantization &amp; DOS</div>
      <div class="ctrl-sub">Continuous 2D paraboloid dispersion reorganizes into discrete, degenerate Landau levels with increasing B.</div>
    </div>
    <div class="control-group">
      <div class="label-row">
        <span class="label-name">Magnetic field B</span>
        <span class="label-value" id="b-value">0.00</span>
      </div>
      <input type="range" id="b-slider" min="0" max="8" step="0.02" value="0">
    </div>
    <label class="checkbox-row">
      <input type="checkbox" id="disorder-checkbox">
      <span>Enable Impurity Disorder</span>
    </label>
    <div class="control-group hidden" id="disorder-control-group">
      <div class="label-row">
        <span class="label-name">Disorder Broadening Γ</span>
        <span class="label-value" id="gamma-value">10.00</span>
      </div>
      <input type="range" id="gamma-slider" min="2" max="25" step="0.1" value="10">
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('display-canvas');
const ctx = canvas.getContext('2d');

const W = 900, H = 500;
const gridSteps = 26, maxEnergyVal = 210, EFermi = 115;
const kMax = 140, cCoeff = maxEnergyVal / (kMax * kMax), energyScale = 22;

// ── light palette ─────────────────────────────────────────────
const C = {
  bg:          '#f8fafc',
  grid:        '#e2e8f0',
  axes:        '#94a3b8',
  text:        '#1e293b',
  muted:       '#64748b',
  paraboloid:  'rgba(220,38,38,',
  landau:      '#dc2626',
  landauDim:   'rgba(220,38,38,0.22)',
  fermiDisk:   'rgba(37,99,235,',
  fermiLabel:  '#1d4ed8',
  dosBase:     'rgba(37,99,235,',
  dosStroke:   '#2563eb',
  dosDim:      'rgba(37,99,235,0.28)',
  dashedLine:  'rgba(100,116,139,0.35)',
  bracket:     '#64748b',
  spacing:     '#1e293b',
};

let B = 0, useDisorder = false, Gamma = 10;

function setupCanvas() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = Math.floor(W * dpr);
  canvas.height = Math.floor(H * dpr);
  canvas.style.aspectRatio = W + ' / ' + H;
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(dpr, dpr);
}
setupCanvas();

function getDosAtEnergy(E, gamma) {
  let dos = 0;
  const nMax = Math.ceil((maxEnergyVal + 60) / (B * energyScale));
  const baseW = maxDosW * 0.35;
  const peakW = baseW + B * 16;
  const norm  = peakW * (B * energyScale) * (2.0 / 2.0) * 0.5;
  for (let N = 0; N < nMax; N++) {
    const lE = (N + 0.5) * B * energyScale;
    const arg = (E - lE) ** 2 / (2 * gamma * gamma);
    if (arg < 12) dos += norm * Math.exp(-arg) / (gamma * Math.sqrt(2 * Math.PI));
  }
  return dos;
}

const X0 = 240, Y0 = H - 80;
const dosX0 = 590, dosY0 = H - 80, maxDosW = 230;

function project(kx, ky, E) {
  return { x: X0 + kx - ky*0.6, y: Y0 - E + ky*0.3 };
}

function render() {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, W, H);

  // ── 3D isometric dispersion ───────────────────────────────
  if (B === 0) {
    ctx.lineWidth = 1;
    for (let i = 0; i <= gridSteps; i++) {
      const kx = -kMax + (2*kMax*i)/gridSteps;
      ctx.beginPath(); let first = true;
      for (let j = 0; j <= gridSteps; j++) {
        const ky = -kMax + (2*kMax*j)/gridSteps;
        const E  = cCoeff*(kx*kx + ky*ky);
        if (E <= maxEnergyVal) {
          const pt = project(kx, ky, E);
          first ? ctx.moveTo(pt.x, pt.y) : ctx.lineTo(pt.x, pt.y);
          first = false;
        }
      }
      ctx.strokeStyle = C.paraboloid + '0.30)'; ctx.stroke();
    }
    for (let j = 0; j <= gridSteps; j++) {
      const ky = -kMax + (2*kMax*j)/gridSteps;
      ctx.beginPath(); let first = true;
      for (let i = 0; i <= gridSteps; i++) {
        const kx = -kMax + (2*kMax*i)/gridSteps;
        const E  = cCoeff*(kx*kx + ky*ky);
        if (E <= maxEnergyVal) {
          const pt = project(kx, ky, E);
          first ? ctx.moveTo(pt.x, pt.y) : ctx.lineTo(pt.x, pt.y);
          first = false;
        }
      }
      ctx.strokeStyle = C.paraboloid + '0.30)'; ctx.stroke();
    }
  } else {
    let N = 0;
    while (true) {
      const lE = (N + 0.5) * B * energyScale;
      if (lE > maxEnergyVal + 20) break;
      const rk = Math.sqrt(lE / cCoeff);
      ctx.beginPath();
      for (let s = 0; s <= 72; s++) {
        const theta = s * 2*Math.PI / 72;
        const pt = project(rk*Math.cos(theta), rk*Math.sin(theta), lE);
        s === 0 ? ctx.moveTo(pt.x, pt.y) : ctx.lineTo(pt.x, pt.y);
      }
      ctx.strokeStyle = lE <= EFermi ? C.landau : C.landauDim;
      ctx.lineWidth   = lE <= EFermi ? 3 : 1.8;
      ctx.stroke();
      if (B >= 1.2 && lE <= maxEnergyVal) {
        const lp = project(-rk, 0, lE);
        ctx.fillStyle = C.muted; ctx.font = '12px sans-serif';
        ctx.fillText(`N = ${N}`, lp.x - 42, lp.y + 4);
      }
      N++;
    }
    if (B >= 1.2) {
      const e0 = 0.5*B*energyScale, e1 = 1.5*B*energyScale;
      if (e1 <= maxEnergyVal) {
        const r1 = Math.sqrt(e1/cCoeff);
        const p0 = project(r1,0,e0), p1 = project(r1,0,e1);
        const bx = Math.max(p0.x, p1.x) + 18;
        ctx.strokeStyle = C.bracket; ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(bx-4, p0.y); ctx.lineTo(bx, p0.y);
        ctx.lineTo(bx, p1.y);   ctx.lineTo(bx-4, p1.y);
        ctx.stroke();
        ctx.fillStyle = C.spacing; ctx.font = '13px sans-serif';
        ctx.fillText('Δε = ħω_c', bx + 8, (p0.y + p1.y)/2 + 5);
      }
    }
  }

  // Fermi disk
  const rF = Math.sqrt(EFermi / cCoeff);
  ctx.fillStyle   = C.fermiDisk + '0.10)';
  ctx.strokeStyle = C.fermiDisk + '0.50)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let s = 0; s <= 64; s++) {
    const theta = s*2*Math.PI/64;
    const pt = project(rF*Math.cos(theta), rF*Math.sin(theta), EFermi);
    s === 0 ? ctx.moveTo(pt.x, pt.y) : ctx.lineTo(pt.x, pt.y);
  }
  ctx.fill(); ctx.stroke();

  // dashed E_F connector
  ctx.strokeStyle = C.dashedLine; ctx.lineWidth = 1;
  ctx.setLineDash([4,4]);
  ctx.beginPath();
  ctx.moveTo(X0, Y0 - EFermi); ctx.lineTo(dosX0, dosY0 - EFermi);
  ctx.stroke(); ctx.setLineDash([]);

  // dispersion axes
  ctx.strokeStyle = C.axes; ctx.lineWidth = 1.5;
  ctx.fillStyle = C.text; ctx.font = 'italic 14px sans-serif';
  const bot = project(0,0,0), top = project(0,0,maxEnergyVal+30);
  const kxe = project(kMax+25,0,0), kye = project(0,kMax+25,0);
  ctx.beginPath(); ctx.moveTo(bot.x,bot.y); ctx.lineTo(top.x,top.y); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(top.x-4,top.y+10); ctx.lineTo(top.x,top.y); ctx.lineTo(top.x+4,top.y+10);
  ctx.stroke();
  ctx.fillText('E', top.x-15, top.y+4);
  ctx.beginPath(); ctx.moveTo(bot.x,bot.y); ctx.lineTo(kxe.x,kxe.y); ctx.stroke();
  ctx.fillText('kₓ', kxe.x+8, kxe.y+4);
  ctx.beginPath(); ctx.moveTo(bot.x,bot.y); ctx.lineTo(kye.x,kye.y); ctx.stroke();
  ctx.fillText('kᵧ', kye.x-16, kye.y+12);

  // ── DOS panel ─────────────────────────────────────────────
  ctx.strokeStyle = C.axes; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(dosX0, dosY0); ctx.lineTo(dosX0 + maxDosW + 20, dosY0); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(dosX0, dosY0); ctx.lineTo(dosX0, dosY0 - maxEnergyVal - 30); ctx.stroke();

  ctx.fillStyle = C.text; ctx.font = '13px sans-serif';
  ctx.fillText('Density of states D(E)', dosX0 + 20, dosY0 + 22);
  ctx.fillText('E', dosX0 - 14, dosY0 - maxEnergyVal - 22);
  ctx.fillStyle = C.fermiLabel;
  ctx.fillText('E_F', dosX0 - 28, dosY0 - EFermi + 4);

  const baseW = maxDosW * 0.35 * 0.5;

  if (B === 0) {
    // constant 2D DOS
    ctx.fillStyle   = C.dosBase + '0.20)';
    ctx.strokeStyle = C.dosStroke;
    ctx.lineWidth = 2;
    ctx.fillRect(dosX0+1, dosY0 - EFermi, baseW, EFermi);
    ctx.strokeRect(dosX0+1, dosY0 - maxEnergyVal, baseW, maxEnergyVal);

  } else if (!useDisorder) {
    // ideal delta-function Landau levels (rendered as thin bars)
    const barH = 6;
    const barW = getDosAtEnergy(0.5*B*energyScale, 2.0);
    let N = 0;
    while (true) {
      const lE = (N + 0.5)*B*energyScale;
      if (lE > maxEnergyVal + 10) break;
      const y = dosY0 - lE;
      if (lE <= EFermi) {
        ctx.fillStyle   = C.dosBase + '0.80)';
        ctx.strokeStyle = C.dosStroke;
        ctx.lineWidth = 1.5;
        ctx.fillRect(dosX0+1, y - barH/2, barW, barH);
        ctx.strokeRect(dosX0+1, y - barH/2, barW, barH);
      } else {
        ctx.strokeStyle = C.dosBase + '0.35)';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(dosX0+1, y - barH/2, barW, barH);
      }
      N++;
    }

  } else {
    // Gaussian-broadened Landau levels
    const steps = 540, de = maxEnergyVal / steps;
    ctx.lineWidth = 1.2;
    for (let s = 0; s < steps; s++) {
      const E = s * de;
      const amp = getDosAtEnergy(E, Gamma);
      if (amp < 0.5) continue;
      const y = dosY0 - E;
      if (E <= EFermi) {
        ctx.fillStyle = C.dosBase + '0.65)';
        ctx.fillRect(dosX0+1, y - de, amp, de + 0.3);
        ctx.strokeStyle = C.dosStroke;
        ctx.beginPath();
        ctx.moveTo(dosX0+1+amp, y-de); ctx.lineTo(dosX0+1+amp, y);
        ctx.stroke();
      } else {
        ctx.strokeStyle = C.dosBase + '0.28)';
        ctx.beginPath();
        ctx.moveTo(dosX0+1, y - de/2); ctx.lineTo(dosX0+1+amp, y - de/2);
        ctx.stroke();
      }
    }
  }
}

// ── events ────────────────────────────────────────────────────
document.getElementById('b-slider').addEventListener('input', function(e) {
  B = parseFloat(e.target.value);
  document.getElementById('b-value').textContent = B.toFixed(2);
  render();
});
document.getElementById('disorder-checkbox').addEventListener('change', function(e) {
  useDisorder = e.target.checked;
  document.getElementById('disorder-control-group').classList.toggle('hidden', !useDisorder);
  render();
});
document.getElementById('gamma-slider').addEventListener('input', function(e) {
  Gamma = parseFloat(e.target.value);
  document.getElementById('gamma-value').textContent = Gamma.toFixed(2);
  render();
});
window.addEventListener('resize', () => { setupCanvas(); render(); });

render();
</script>
</body>
</html>
