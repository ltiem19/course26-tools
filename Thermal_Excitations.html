<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fermi Sphere Thermal Effect</title>
<style>
  body { font-family: 'Courier New', monospace; background:#fff; color:#000; margin:0; padding:10px; }
  .container { max-width:600px; margin:0 auto; text-align:center; }
  .controls { background:#f5f5f5; padding:15px; border-radius:8px; margin-bottom:12px; border:1px solid #ccc; }
  .sphere-box { background:#f5f5f5; padding:12px; border-radius:8px; border:1px solid #ccc; }
  canvas { border:2px solid #999; background:#fff; display:block; margin:0 auto; max-width:100%; }
  .row { display:flex; align-items:center; justify-content:center; gap:12px; margin:10px 0; flex-wrap:wrap; }
  label { font-size:15px; font-weight:bold; white-space:nowrap; }
  input[type=range] {
    flex:1; min-width:120px; max-width:260px; height:8px;
    -webkit-appearance:none; appearance:none;
    background:#ddd; border-radius:4px; outline:none; cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:28px; height:28px;
    background:#4444aa; border-radius:50%; cursor:pointer; margin-top:-10px;
  }
  input[type=range]::-moz-range-thumb {
    width:28px; height:28px; background:#4444aa;
    border-radius:50%; border:none; cursor:pointer;
  }
  input[type=range]::-webkit-slider-runnable-track { height:8px; background:#ddd; border-radius:4px; }
  input[type=range]::-moz-range-track { height:8px; background:#ddd; border-radius:4px; }
  input[type=checkbox] { width:22px; height:22px; cursor:pointer; }
  .val { font-size:16px; min-width:60px; text-align:left; }
  .legend { margin-top:12px; padding:10px; background:#f5f5f5; border:1px solid #ccc; border-radius:4px; text-align:left; font-size:14px; }
  .li { display:flex; align-items:center; margin:4px 0; }
  .sq { width:18px; height:18px; margin-right:10px; border:1px solid #999; flex-shrink:0; }
</style>
</head>
<body>
<div class="container">
  <div class="controls">
    <div class="row">
      <label>Temperature:</label>
      <input type="range" id="tempSlider" min="0" max="100" step="1" value="0">
      <span class="val" id="tempVal">0 K</span>
    </div>
    <div class="row">
      <label><input type="checkbox" id="quantCB"> Quantize</label>
    </div>
  </div>
  <div class="sphere-box">
    <canvas id="cv"></canvas>
    <div class="legend">
      <div class="li"><div class="sq" style="background:#4444aa"></div>Blue = Occupied states</div>
      <div class="li"><div class="sq" style="background:#cccccc"></div>Gray = Vacant states</div>
    </div>
  </div>
</div>

<script>
var canvas = document.getElementById('cv');
var ctx = canvas.getContext('2d');
var temperature = 0;
var quantized = false;

// Fixed physical parameters
var EF = 5.0;          // eV, Fermi energy (continuous)
var vF = 0.06;         // eV/px, continuous case smearing scale
var QDELTA = 0.008;    // eV, fixed level spacing for quantized case (8 meV)

var sc, kF;            // scale factor and Fermi radius in pixels

function setupCanvas() {
  var w = Math.max(Math.min(canvas.parentElement.clientWidth - 30, 400), 200);
  canvas.width = w;
  canvas.height = w * 1.55;
  sc = w / 400;
  kF = 140 * sc;
}

function fermiDirac(deltaE_eV, kBT_eV) {
  if (kBT_eV < 1e-10) return deltaE_eV <= 0 ? 1 : 0;
  return 1 / (1 + Math.exp(deltaE_eV / kBT_eV));
}

function drawContinuous(cx, cy, kBT) {
  var maxR = kF + 60 * sc;

  // Gray outer disk
  ctx.fillStyle = '#cccccc';
  ctx.beginPath(); ctx.arc(cx, cy, maxR, 0, 2*Math.PI); ctx.fill();

  // Blue filled sphere
  ctx.fillStyle = '#4444aa';
  ctx.beginPath(); ctx.arc(cx, cy, kF, 0, 2*Math.PI); ctx.fill();

  // Thermal particles near EF
  if (temperature > 0) {
    var nPart = Math.min(Math.floor(temperature * 4), 400);
    var maxSpread = Math.min(kF * (kBT / EF) * 50 * 1.5, 38 * sc);

    ctx.fillStyle = '#4444aa';
    for (var i = 0; i < nPart; i++) {
      var a = Math.random() * 2 * Math.PI;
      var s = (Math.random() + Math.random() - 1) * maxSpread;
      var r = kF + Math.abs(s);
      if (r <= maxR) {
        ctx.beginPath(); ctx.arc(cx + r*Math.cos(a), cy + r*Math.sin(a), 1.5*sc, 0, 2*Math.PI); ctx.fill();
      }
    }

    ctx.fillStyle = '#cccccc';
    for (var i = 0; i < nPart; i++) {
      var a = Math.random() * 2 * Math.PI;
      var s = (Math.random() + Math.random() - 1) * maxSpread;
      var r = kF - Math.abs(s);
      if (r > 0) {
        ctx.beginPath(); ctx.arc(cx + r*Math.cos(a), cy + r*Math.sin(a), 1.5*sc, 0, 2*Math.PI); ctx.fill();
      }
    }
  }

  // Black dashed Fermi surface
  ctx.strokeStyle = '#000'; ctx.lineWidth = 2*sc;
  ctx.setLineDash([5*sc, 5*sc]);
  ctx.beginPath(); ctx.arc(cx, cy, kF, 0, 2*Math.PI); ctx.stroke();
  ctx.setLineDash([]);
}

function drawQuantized(cx, cy, kBT) {
  var sp = 50 * sc;
  var radii = [kF - sp, kF, kF + sp];
  // EF sits BETWEEN ring 1 and ring 2
  // Energies relative to EF: -1.5, -0.5, +0.5 * QDELTA
  var dEs = [-1.5 * QDELTA, -0.5 * QDELTA, +0.5 * QDELTA];
  var occ = [fermiDirac(dEs[0], kBT), fermiDirac(dEs[1], kBT), fermiDirac(dEs[2], kBT)];

  for (var i = 0; i < 3; i++) {
    var r = radii[i];
    var o = occ[i];

    if (i < 2) {
      ctx.strokeStyle = '#4444aa'; ctx.lineWidth = 8*sc;
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2*Math.PI); ctx.stroke();
      var nHoles = Math.floor((1 - o) * 240);
      ctx.fillStyle = '#aaaaaa';
      for (var j = 0; j < nHoles; j++) {
        var a = (j / Math.max(nHoles, 1)) * 2 * Math.PI;
        ctx.beginPath(); ctx.arc(cx + r*Math.cos(a), cy + r*Math.sin(a), 2*sc, 0, 2*Math.PI); ctx.fill();
      }
    } else {
      ctx.strokeStyle = '#cccccc'; ctx.lineWidth = 8*sc;
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2*Math.PI); ctx.stroke();
      var nElec = Math.floor(o * 240);
      ctx.fillStyle = '#4444aa';
      for (var j = 0; j < nElec; j++) {
        var a = (j / Math.max(nElec, 1)) * 2 * Math.PI;
        ctx.beginPath(); ctx.arc(cx + r*Math.cos(a), cy + r*Math.sin(a), 2*sc, 0, 2*Math.PI); ctx.fill();
      }
    }

    // Dashed EF marker sits between ring 1 and ring 2 (midpoint)
    if (i === 1) {
      var efR = radii[1] + (radii[2] - radii[1]) * 0.5;
      ctx.strokeStyle = '#000'; ctx.lineWidth = 2*sc;
      ctx.setLineDash([5*sc, 5*sc]);
      ctx.beginPath(); ctx.arc(cx, cy, efR, 0, 2*Math.PI); ctx.stroke();
      ctx.setLineDash([]);
    }
  }
}

function drawHistogram(kBT) {
  var hY = 470 * sc, hH = 110 * sc, hW = 280 * sc;
  var hX = (canvas.width - hW) / 2;

  ctx.strokeStyle = '#000'; ctx.lineWidth = 1*sc;
  ctx.beginPath();
  ctx.moveTo(hX, hY); ctx.lineTo(hX + hW, hY);
  ctx.moveTo(hX, hY); ctx.lineTo(hX, hY - hH);
  ctx.stroke();

  ctx.fillStyle = '#000'; ctx.font = (12*sc) + 'px Courier New';
  ctx.fillText('|k|', hX + hW + 6*sc, hY + 4*sc);
  ctx.save();
  ctx.translate(hX - 38*sc, hY - hH/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillText('occupation', 0, 0);
  ctx.restore();

  if (quantized) {
    var sp = 50 * sc;
    var sp = 50 * sc;
    var dEs = [-1.5*QDELTA, -0.5*QDELTA, +0.5*QDELTA];
    var bw = 14 * sc;
    for (var i = 0; i < 3; i++) {
      var o = fermiDirac(dEs[i], kBT);
      var xp = hX + hW/2 + (i-1) * sp * 1.2;
      var bh = hH * 0.85 * o;
      ctx.fillStyle = '#4444aa';
      ctx.fillRect(xp - bw/2, hY - bh, bw, bh);
    }
  } else {
    var nBins = 100, bw = hW / nBins;
    for (var i = 0; i < nBins; i++) {
      var frac = (i / nBins) - 0.5;
      var k = kF + frac * hW;
      var dE = vF * (k - kF) * (EF / kF);
      var o = fermiDirac(dE, kBT);
      var bh = hH * 0.85 * o;
      ctx.fillStyle = '#4444aa';
      ctx.fillRect(hX + i*bw, hY - bh, bw - 0.5, bh);
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // Explicit white background to prevent bleed-through
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  var cx = canvas.width / 2, cy = 175 * sc;
  var kBT_cont  = temperature * 8.617e-5;
  var Teff_quant = Math.max(0, temperature - 50);  // suppress excitations below 50K
  var kBT_quant = Teff_quant * 8.617e-5 * 0.5;

  // Axes
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1*sc;
  ctx.beginPath();
  ctx.moveTo(0, cy); ctx.lineTo(canvas.width, cy);
  ctx.moveTo(cx, 5*sc); ctx.lineTo(cx, 345*sc);
  ctx.stroke();

  ctx.fillStyle = '#000'; ctx.font = (15*sc) + 'px Courier New';
  ctx.fillText('kx', canvas.width - 22*sc, cy - 8*sc);
  ctx.fillText('ky', cx + 8*sc, 18*sc);

  if (quantized) { drawQuantized(cx, cy, kBT_quant); drawHistogram(kBT_quant); }
  else           { drawContinuous(cx, cy, kBT_cont);  drawHistogram(kBT_cont);  }
}

document.getElementById('tempSlider').addEventListener('input', function() {
  temperature = parseInt(this.value);
  document.getElementById('tempVal').textContent = temperature + ' K';
  draw();
});

document.getElementById('quantCB').addEventListener('change', function() {
  quantized = this.checked;
  draw();
});

window.addEventListener('resize', function() { setupCanvas(); draw(); });

setupCanvas();
draw();
</script>
</body>
</html>
