<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Quantum Well</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f0f0;
    padding: 12px;
    min-height: 100vh;
  }

  .card {
    background: #fff;
    border-radius: 10px;
    padding: 16px;
    max-width: 860px;
    margin: 0 auto;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }

  h1 {
    font-size: clamp(15px, 4vw, 20px);
    font-weight: 700;
    color: #222;
    margin-bottom: 18px;
    line-height: 1.3;
  }

  /* ---- Slider block ---- */
  .ctrl { margin-bottom: 22px; }

  .ctrl label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #444;
    margin-bottom: 10px;
  }

  /* Wrapper gives the track a visible hit area */
  .slider-wrap {
    position: relative;
    width: 100%;
    height: 36px;        /* tall touch target */
    display: flex;
    align-items: center;
  }

  /* Track drawn with a div so it's visible on every browser */
  .slider-track {
    position: absolute;
    left: 0; right: 0;
    height: 8px;
    background: #d1d5db;
    border-radius: 4px;
    pointer-events: none;
  }

  input[type=range] {
    position: relative;   /* sits on top of the track div */
    width: 100%;
    height: 36px;
    margin: 0;
    background: transparent;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
    cursor: pointer;
    z-index: 1;
  }

  /* Chrome / Safari / Edge / Android WebView */
  input[type=range]::-webkit-slider-runnable-track {
    width: 100%;
    height: 8px;
    background: transparent;   /* track drawn by .slider-track */
    border-radius: 4px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #2563eb;
    border: 3px solid #fff;
    box-shadow: 0 0 0 2px #2563eb;
    margin-top: -10px;   /* (28-8)/2 */
    cursor: pointer;
  }

  /* Firefox */
  input[type=range]::-moz-range-track {
    width: 100%;
    height: 8px;
    background: transparent;
    border-radius: 4px;
  }
  input[type=range]::-moz-range-thumb {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #2563eb;
    border: 3px solid #fff;
    box-shadow: 0 0 0 2px #2563eb;
    cursor: pointer;
  }

  /* ---- Canvas ---- */
  #canvas {
    display: block;
    width: 100%;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    touch-action: none;
  }
</style>
</head>
<body>
<div class="card">
  <h1>Infinite Quantum Well:<br>Energy Levels &amp; Wavefunctions</h1>

  <div class="ctrl">
    <label id="lblW">Well Width: 20.0 nm (from 5 to 25.0 nm)</label>
    <div class="slider-wrap">
      <div class="slider-track"></div>
      <input type="range" id="slW" min="10" max="45" step="0.5" value="20">
    </div>
  </div>

  <div class="ctrl">
    <label id="lblM">m*/m₀: 0.200</label>
    <div class="slider-wrap">
      <div class="slider-track"></div>
      <input type="range" id="slM" min="0.1" max="0.5" step="0.001" value="0.2">
    </div>
  </div>

  <canvas id="canvas"></canvas>
</div>

<script>
  // ── constants ──────────────────────────────────────────────
  const hbar = 1.054571817e-34;
  const m_e  = 9.1093837015e-31;
  const eV   = 1.602176634e-19;
  const V0   = 300;   // meV barrier
  const x0   = 5;    // nm well start
  const xMax = 60;   // nm plot range

  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');
  const slW    = document.getElementById('slW');
  const slM    = document.getElementById('slM');
  const lblW   = document.getElementById('lblW');
  const lblM   = document.getElementById('lblM');

  // ── physics ────────────────────────────────────────────────
  function energies(L, mstar) {
    const fac = (Math.PI**2 * hbar**2) / (2 * mstar * m_e * (L*1e-9)**2);
    return [1,2,3].map(n => fac * n*n / eV * 1000); // meV
  }

  function psi(x, n, L) {
    if (x >= x0 && x < x0 + L)
      return Math.sqrt(2/L) * Math.sin(n * Math.PI * (x - x0) / L);
    return 0;
  }

  // ── draw ───────────────────────────────────────────────────
  function draw() {
    const L    = parseFloat(slW.value);
    const mstar = parseFloat(slM.value);
    const En   = energies(L, mstar);

    lblW.textContent = `Well Width: ${L.toFixed(1)} nm (from ${x0} to ${(x0+L).toFixed(1)} nm)`;
    lblM.textContent = `m*/m₀: ${mstar.toFixed(3)}`;

    const dpr = window.devicePixelRatio || 1;
    const cssW = canvas.offsetWidth;
    const cssH = Math.round(cssW * 0.6);      // 5:3 aspect, responsive
    canvas.style.height = cssH + 'px';
    canvas.width  = cssW * dpr;
    canvas.height = cssH * dpr;
    ctx.scale(dpr, dpr);

    const mg = { t: 16, r: 16, b: 46, l: 56 };
    const pw = cssW - mg.l - mg.r;
    const ph = cssH - mg.t - mg.b;

    const sx = x => mg.l + (x / xMax) * pw;
    const sy = y => mg.t + ph - (y / 400) * ph;

    ctx.clearRect(0, 0, cssW, cssH);

    // grid
    ctx.strokeStyle = '#eee';
    ctx.lineWidth = 1;
    ctx.setLineDash([3,3]);
    for (let i=0; i<=4; i++) {
      const y = sy(i*100);
      ctx.beginPath(); ctx.moveTo(mg.l,y); ctx.lineTo(mg.l+pw,y); ctx.stroke();
    }
    for (let i=0; i<=6; i++) {
      const x = sx(i*10);
      ctx.beginPath(); ctx.moveTo(x,mg.t); ctx.lineTo(x,mg.t+ph); ctx.stroke();
    }
    ctx.setLineDash([]);

    // axes
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(mg.l, mg.t);
    ctx.lineTo(mg.l, mg.t+ph);
    ctx.lineTo(mg.l+pw, mg.t+ph);
    ctx.stroke();

    // tick labels
    ctx.fillStyle = '#444';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    const fs = Math.max(10, Math.min(13, cssW/50));
    ctx.font = `${fs}px sans-serif`;
    for (let i=0; i<=6; i++)
      ctx.fillText(i*10, sx(i*10), mg.t+ph+6);
    ctx.fillText('Position (nm)', mg.l+pw/2, mg.t+ph+22);

    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    for (let i=0; i<=4; i++)
      ctx.fillText(i*100, mg.l-8, sy(i*100));
    ctx.save();
    ctx.translate(14, mg.t+ph/2);
    ctx.rotate(-Math.PI/2);
    ctx.textAlign = 'center';
    ctx.fillText('Energy (meV)', 0, 0);
    ctx.restore();

    // potential well
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(sx(0),     sy(V0));
    ctx.lineTo(sx(x0),    sy(V0));
    ctx.lineTo(sx(x0),    sy(0));
    ctx.lineTo(sx(x0+L),  sy(0));
    ctx.lineTo(sx(x0+L),  sy(V0));
    ctx.lineTo(sx(xMax),  sy(V0));
    ctx.stroke();

    // energy levels + wavefunctions
    const colors = ['#2563eb','#dc2626','#16a34a'];
    const N = 600;

    for (let n=0; n<3; n++) {
      if (En[n] >= V0) continue;

      // dashed energy level
      ctx.strokeStyle = colors[n];
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6,4]);
      ctx.beginPath();
      ctx.moveTo(sx(0),    sy(En[n]));
      ctx.lineTo(sx(xMax), sy(En[n]));
      ctx.stroke();
      ctx.setLineDash([]);

      // wavefunction
      ctx.lineWidth = 2;
      ctx.beginPath();
      let first = true;
      for (let i=0; i<=N; i++) {
        const x = (i/N)*xMax;
        const y = En[n] + psi(x, n+1, L) * 25;
        first ? ctx.moveTo(sx(x),sy(y)) : ctx.lineTo(sx(x),sy(y));
        first = false;
      }
      ctx.stroke();
    }
  }

  slW.addEventListener('input', draw);
  slM.addEventListener('input', draw);
  window.addEventListener('resize', draw);

  draw();
</script>
</body>
</html>
