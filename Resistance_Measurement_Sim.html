<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Interactive Resistance Measurement</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            padding: 8px;
        }
        h1 {
            text-align: center;
            color: #4CAF50;
            font-size: 1.05em;
            margin-bottom: 6px;
        }
        .controls {
            background: #333;
            padding: 7px 12px;
            border-radius: 8px;
            margin-bottom: 7px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .controls label { color: #ccc; font-size: 0.85em; white-space: nowrap; }
        .controls input[type=range] { flex: 1; }
        .controls span { color: #4CAF50; font-weight: bold; font-size: 0.85em; white-space: nowrap; min-width: 50px; text-align: right; }
        .svg-wrapper {
            position: relative;
            width: 100%;
            background: #f5f5f5;
            border-radius: 8px;
            border: 2px solid #888;
            touch-action: none;
        }
        svg { display: block; width: 100%; height: auto; }
        .btn-group {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        button {
            min-height: 40px;
            min-width: 82px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.8em;
            cursor: pointer;
        }
        .btn2t { background: #f44336; color: #fff; }
        .btn4t { background: #2196F3; color: #fff; }
    </style>
</head>
<body>
    <h1>Interactive Resistance Measurement</h1>
    <div class="controls">
        <label>Contact Resistance:</label>
        <input type="range" id="sliderRc" min="0.1" max="50" step="0.1" value="10">
        <span id="rcVal">10.0 Ω</span>
    </div>
    <div class="svg-wrapper">
        <div class="btn-group">
            <button class="btn2t" id="btn2T">2-Terminal</button>
            <button class="btn4t" id="btn4T">4-Terminal</button>
        </div>
        <svg id="svg" viewBox="0 0 800 320">
            <defs>
                <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0,10 3.5,0 7" fill="#f44336"/>
                </marker>
            </defs>

            <!-- ── current loop ── -->
            <polyline points="75,230 75,190 565,190 725,190 725,230 75,230"
                      fill="none" stroke="#f44336" stroke-width="4"/>
            <!-- current arrows -->
            <line x1="96" y1="190" x2="118" y2="190" stroke="#f44336" stroke-width="4" marker-end="url(#arr)"/>
            <line x1="568" y1="190" x2="590" y2="190" stroke="#f44336" stroke-width="4" marker-end="url(#arr)"/>

            <!-- current source -->
            <circle cx="650" cy="190" r="24" fill="white" stroke="#444" stroke-width="2"/>
            <text x="650" y="195" fill="#333" text-anchor="middle" font-weight="bold" font-size="15">I</text>
            <text x="650" y="222" fill="#666" text-anchor="middle" font-size="11">1.0 mA</text>

            <!-- left contact -->
            <rect x="125" y="173" width="20" height="36" fill="#FFD700" stroke="#c8940a" stroke-width="2"/>
            <text x="135" y="222" fill="#666" text-anchor="middle" font-size="11">Source</text>
            <text x="135" y="168" fill="#666" text-anchor="middle" font-size="11">R_c</text>

            <!-- sample bar -->
            <rect id="sampleBar" x="145" y="178" width="400" height="26" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
            <text x="345" y="196" fill="white" text-anchor="middle" font-weight="bold" font-size="14">Sample</text>
            <text x="345" y="168" fill="#555" text-anchor="middle" font-size="11">R_sample = 50 Ω</text>

            <!-- right contact -->
            <rect x="545" y="173" width="20" height="36" fill="#FFD700" stroke="#c8940a" stroke-width="2"/>
            <text x="555" y="222" fill="#666" text-anchor="middle" font-size="11">Drain</text>
            <text x="555" y="168" fill="#666" text-anchor="middle" font-size="11">R_c</text>

            <!-- voltmeter -->
            <circle cx="400" cy="52" r="24" fill="white" stroke="#444" stroke-width="2"/>
            <text x="400" y="57" fill="#333" text-anchor="middle" font-weight="bold" font-size="15">V</text>
            <text x="400" y="22" fill="#666" text-anchor="middle" font-size="11">Voltmeter</text>

            <!-- voltage wires (dynamic) -->
            <line id="vw_left_vert"  x1="200" y1="163" x2="200" y2="100" stroke="#2196F3" stroke-width="3" stroke-dasharray="5,4"/>
            <line id="vw_right_vert" x1="400" y1="163" x2="400" y2="100" stroke="#2196F3" stroke-width="3" stroke-dasharray="5,4"/>
            <line id="vw_left_horiz"  x1="200" y1="100" x2="376" y2="100" stroke="#2196F3" stroke-width="3" stroke-dasharray="5,4"/>
            <line id="vw_right_horiz" x1="400" y1="100" x2="424" y2="100" stroke="#2196F3" stroke-width="3" stroke-dasharray="5,4"/>
            <line x1="376" y1="76" x2="376" y2="100" stroke="#2196F3" stroke-width="3" stroke-dasharray="5,4"/>
            <line x1="424" y1="76" x2="424" y2="100" stroke="#2196F3" stroke-width="3" stroke-dasharray="5,4"/>

            <!-- probe hit targets (large, invisible) -->
            <circle id="hit1" cx="200" cy="163" r="26" fill="transparent" style="cursor:grab"/>
            <circle id="hit2" cx="400" cy="163" r="26" fill="transparent" style="cursor:grab"/>
            <!-- probe visuals (no pointer events) -->
            <circle id="vis1" cx="200" cy="163" r="15" fill="#2196F3" stroke="#1565C0" stroke-width="3" pointer-events="none"/>
            <circle id="vis2" cx="400" cy="163" r="15" fill="#2196F3" stroke="#1565C0" stroke-width="3" pointer-events="none"/>
            <text id="lbl1" x="200" y="152" fill="#444" text-anchor="middle" font-size="11" pointer-events="none">V+</text>
            <text id="lbl2" x="400" y="152" fill="#444" text-anchor="middle" font-size="11" pointer-events="none">V−</text>

            <!-- distance line -->
            <line id="distLine" x1="145" y1="255" x2="545" y2="255" stroke="#FFC107" stroke-width="2" stroke-dasharray="4,3"/>
            <text id="distLabel" x="345" y="270" fill="#FFC107" text-anchor="middle" font-weight="bold" font-size="12">1000 μm</text>

            <!-- readout upper right -->
            <text x="560" y="30"  fill="#333" font-size="11" font-weight="bold">R = V_meas / 1 mA</text>
            <text id="outR"   x="560" y="52"  fill="#4CAF50" font-size="13" font-weight="bold">= 0.0 mV / 1 mA = 0.0 Ω</text>
            <text x="560" y="76"  fill="#333" font-size="11" font-weight="bold">Calculated resistivity:</text>
            <text id="outRho" x="560" y="98"  fill="#4CAF50" font-size="13" font-weight="bold">ρ = 0.0 Ω / 1.000 mm = 0.0 Ω/mm</text>
        </svg>
    </div>

<script>
// ── constants ──────────────────────────────────────────────
const SX0 = 145, SX1 = 545;          // sample bar x-edges in SVG coords
const LC  = 135, RC  = 555;          // contact centre x
const RS  = 50;                       // fixed sample resistance (Ω)
const PROBE_Y = 163;

// ── element refs ───────────────────────────────────────────
const svg    = document.getElementById('svg');
const hit1   = document.getElementById('hit1');
const hit2   = document.getElementById('hit2');
const vis1   = document.getElementById('vis1');
const vis2   = document.getElementById('vis2');
const lbl1   = document.getElementById('lbl1');
const lbl2   = document.getElementById('lbl2');
const slider = document.getElementById('sliderRc');
const rcVal  = document.getElementById('rcVal');

// probe x positions
let px1 = 200, px2 = 450;
let dragging = null; // 1 or 2

// ── coordinate helper ──────────────────────────────────────
function clientToSvgX(clientX) {
    const r = svg.getBoundingClientRect();
    return (clientX - r.left) * (800 / r.width);
}

// ── move probe (index 1 or 2) ──────────────────────────────
function moveProbe(idx, rawX) {
    // clamp to device extent
    rawX = Math.max(LC, Math.min(RC, rawX));
    // snap to contact centres
    if (rawX < SX0) rawX = LC;
    if (rawX > SX1) rawX = RC;
    // no crossing
    if (idx === 1) rawX = Math.min(rawX, px2);
    if (idx === 2) rawX = Math.max(rawX, px1);
    if (idx === 1) px1 = rawX; else px2 = rawX;
    render();
}

// ── main render ────────────────────────────────────────────
function render() {
    const lx = Math.min(px1, px2);
    const rx = Math.max(px1, px2);

    // move visuals
    [hit1, vis1, lbl1].forEach(el => el.setAttribute('cx', px1));
    lbl1.setAttribute('x', px1);
    [hit2, vis2, lbl2].forEach(el => el.setAttribute('cx', px2));
    lbl2.setAttribute('x', px2);

    // voltage wires follow probe positions
    document.getElementById('vw_left_vert').setAttribute('x1', px1);
    document.getElementById('vw_left_vert').setAttribute('x2', px1);
    document.getElementById('vw_right_vert').setAttribute('x1', px2);
    document.getElementById('vw_right_vert').setAttribute('x2', px2);
    document.getElementById('vw_left_horiz').setAttribute('x1', px1);
    document.getElementById('vw_right_horiz').setAttribute('x1', px2);

    // contact inclusion
    const incL = lx <= SX0;   // left probe on/past left contact
    const incR = rx >= SX1;   // right probe on/past right contact

    // sample fraction between the two probes
    const eL   = Math.max(lx, SX0);
    const eR   = Math.min(rx, SX1);
    const frac = Math.max(0, (eR - eL) / (SX1 - SX0));

    // measured resistance
    const Rc = parseFloat(slider.value);
    let R = RS * frac;
    if (incL) R += Rc;
    if (incR) R += Rc;

    // distance shown = sample-edge span (excludes contact width)
    const dL     = incL ? SX0 : eL;
    const dR     = incR ? SX1 : eR;
    const sepMM  = (dR - dL) / (SX1 - SX0);   // fraction of 1 mm

    document.getElementById('distLine').setAttribute('x1', dL);
    document.getElementById('distLine').setAttribute('x2', dR);
    document.getElementById('distLabel').setAttribute('x', (dL + dR) / 2);
    document.getElementById('distLabel').textContent = Math.round(sepMM * 1000) + ' μm';

    // readout
    const Vmv = R.toFixed(1);   // I=1mA → V(mV) = R(Ω) numerically
    const rho = sepMM > 0 ? (R / sepMM).toFixed(1) : '—';

    document.getElementById('outR').textContent =
        `= ${Vmv} mV / 1 mA = ${R.toFixed(1)} Ω`;
    document.getElementById('outRho').textContent =
        `ρ = ${R.toFixed(1)} Ω / ${sepMM.toFixed(3)} mm = ${rho} Ω/mm`;
}

// ── drag logic ─────────────────────────────────────────────
hit1.addEventListener('mousedown',  e => { dragging = 1; e.preventDefault(); });
hit2.addEventListener('mousedown',  e => { dragging = 2; e.preventDefault(); });
hit1.addEventListener('touchstart', e => { dragging = 1; e.preventDefault(); }, {passive:false});
hit2.addEventListener('touchstart', e => { dragging = 2; e.preventDefault(); }, {passive:false});

svg.addEventListener('mousemove', e => {
    if (!dragging) return;
    moveProbe(dragging, clientToSvgX(e.clientX));
});
svg.addEventListener('touchmove', e => {
    if (!dragging) return;
    moveProbe(dragging, clientToSvgX(e.touches[0].clientX));
    e.preventDefault();
}, {passive:false});

document.addEventListener('mouseup',  () => dragging = null);
document.addEventListener('touchend', () => dragging = null);

// ── buttons ────────────────────────────────────────────────
document.getElementById('btn2T').addEventListener('click', () => {
    px1 = LC; px2 = RC; render();
});
document.getElementById('btn4T').addEventListener('click', () => {
    px1 = 200; px2 = 450; render();
});

// ── slider ─────────────────────────────────────────────────
slider.addEventListener('input', () => {
    rcVal.textContent = parseFloat(slider.value).toFixed(1) + ' Ω';
    render();
});

// ── init ───────────────────────────────────────────────────
render();
</script>
</body>
</html>
