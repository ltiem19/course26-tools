<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Quantum Hall Edge States & Strict Interactivity</title>
<style>
:root {
  --bg: #0a0e1a;
  --panel: #131929;
  --border: #1f2942;
  --text: #e8ecf4;
  --muted: #8893a8;
  --accent: #6ad0ff;
  --accent-dim: #3a7ba0;
}
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  overflow: hidden;
}
body {
  padding: 12px;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}
.container {
  max-width: 1050px;
  width: 100%;
  display: grid;
  gap: 12px;
}
@media (min-width: 820px) {
  .container { grid-template-columns: 1fr 280px; align-items: start; }
}
.canvas-wrap {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px;
  position: relative;
}
canvas {
  display: block;
  width: 100%;
  height: auto;
  background: #0a0e1a;
  border-radius: 4px;
  touch-action: none;
}
.legend {
  position: absolute;
  top: 14px;
  right: 14px;
  font-size: 11px;
  color: var(--muted);
  background: rgba(10, 14, 26, 0.9);
  padding: 8px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 5px;
  pointer-events: none;
}
.legend .item { display: flex; align-items: center; gap: 6px; }
.legend .line { inline-size: 12px; border-top: 2px solid; }
.legend .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
.controls {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.title { font-size: 14px; font-weight: 600; }
.subtitle { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
.config-option {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  cursor: pointer;
  background: #192239;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
}
.config-option input {
  width: 16px;
  height: 16px;
  accent-color: var(--accent);
}
button {
  background: #1f2942;
  color: var(--text);
  border: 1px solid var(--border);
  padding: 10px 8px;
  min-height: 44px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
}
button:active { background: #2a3a5a; border-color: var(--accent-dim); }
</style>
</head>
<body>
<div class="container">
  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div class="legend">
      <div class="item"><span class="line" style="border-color:rgba(255,255,255,0.02)"></span> Local Bulk Cyclotron Orbits</div>
      <div id="legend-trail" class="item"><span class="line" style="border-color:#6ad0ff"></span> Fast Edge-Skipping State</div>
      <div class="item"><span class="dot" style="background:#ffcc44"></span> Modified Boundary Wall</div>
    </div>
  </div>
  <div class="controls">
    <div>
      <div class="title">Strict Boundary Interactivity</div>
      <div class="subtitle">
        • Click <strong>directly ON the yellow edge</strong> to deform it inward.<br>
        • Click anywhere in the <strong>dark bulk interior</strong> to place the electron.
      </div>
    </div>
    
    <label class="config-option">
      <input type="checkbox" id="picture-toggle">
      <span>Quantum Edge Channel Picture</span>
    </label>

    <button id="reset-btn">Reset Boundaries & Electron</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const W = 700;
const H = 500;
const defaultPad = 16;

const B = 11.0;
const speedScale = 600;
const cyclotronRadius = speedScale / B;

let electron = { x: W / 2, y: defaultPad + 4, vx: -1, vy: 0 };
let trail = [];
const trailMaxLen = 140;
let isQuantumPicture = false;

const gridScale = 8;
const cols = Math.ceil(W / gridScale);
const rows = Math.ceil(H / gridScale);
let wallGrid = new Float32Array(cols * rows);

function setupCanvas() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.floor(W * dpr);
  canvas.height = Math.floor(H * dpr);
  canvas.style.aspectRatio = W + ' / ' + H;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
}
setupCanvas();

function resetGrid() {
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const px = x * gridScale;
      const py = y * gridScale;
      if (px < defaultPad || px > W - defaultPad || py < defaultPad || py > H - defaultPad) {
        wallGrid[y * cols + x] = 1.0; 
      } else {
        wallGrid[y * cols + x] = 0.0; 
      }
    }
  }
}

function sampleGridField(px, py) {
  const gx = Math.floor(px / gridScale);
  const gy = Math.floor(py / gridScale);
  if (gx < 0 || gx >= cols || gy < 0 || gy >= rows) return 1.0;
  return wallGrid[gy * cols + gx];
}

function getGridNormal(px, py) {
  const delta = 4;
  const fX1 = sampleGridField(px - delta, py);
  const fX2 = sampleGridField(px + delta, py);
  const fY1 = sampleGridField(px, py - delta);
  const fY2 = sampleGridField(px, py + delta);
  
  let nx = fX1 - fX2;
  let ny = fY1 - fY2;
  const len = Math.hypot(nx, ny);
  if (len === 0) return { nx: 0, ny: -1 };
  return { nx: nx / len, ny: ny / len };
}

function handleCanvasInteraction(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const mx = (clientX - rect.left) * (W / rect.width);
  const my = (clientY - rect.top) * (H / rect.height);

  if (sampleGridField(mx, my) > 0.5) {
    const r = 65;
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        const px = x * gridScale;
        const py = y * gridScale;
        if (Math.hypot(px - mx, py - my) < r) {
          wallGrid[y * cols + x] = 1.0; 
        }
      }
    }
    if (sampleGridField(electron.x, electron.y) > 0.5) {
      let norm = getGridNormal(electron.x, electron.y);
      while (sampleGridField(electron.x, electron.y) > 0.5) {
        electron.x += norm.nx * 2;
        electron.y += norm.ny * 2;
      }
    }
  } else {
    electron.x = mx;
    electron.y = my;
    const angle = Math.random() * 2 * Math.PI;
    electron.vx = Math.cos(angle);
    electron.vy = Math.sin(angle);
    trail = [];
  }
}

function resetElectron() {
  electron.x = W / 2;
  electron.y = defaultPad + 4;
  electron.vx = -1;
  electron.vy = 0;
  trail = [];
}

const substeps = 8;
const dt = (1 / 60) / substeps;

function step() {
  const dtheta = B * dt;
  const c = Math.cos(dtheta), s = Math.sin(dtheta);
  const nvx = c * electron.vx - s * electron.vy;
  const nvy = s * electron.vx + c * electron.vy;
  electron.vx = nvx;
  electron.vy = nvy;

  electron.x += electron.vx * speedScale * dt;
  electron.y += electron.vy * speedScale * dt;

  if (sampleGridField(electron.x, electron.y) > 0.5) {
    let norm = getGridNormal(electron.x, electron.y);
    
    let protectionCounter = 0;
    while (sampleGridField(electron.x, electron.y) > 0.5 && protectionCounter < 15) {
      electron.x += norm.nx * 2;
      electron.y += norm.ny * 2;
      protectionCounter++;
    }

    const dot = electron.vx * norm.nx + electron.vy * norm.ny;
    if (dot < 0) {
      electron.vx = electron.vx - 2 * dot * norm.nx;
      electron.vy = electron.vy - 2 * dot * norm.ny;
    }
  }

  trail.push({ x: electron.x, y: electron.y });
  while (trail.length > trailMaxLen) trail.shift();
}

/**
 * Robust Field Contour Path Tracer
 * Traces the continuous line segment chain directly between free space and walls, 
 * pushing the channel inward by an absolute spatial distance offset.
 */
function drawQuantumEdgeChannel(ctx, dashOffset) {
  ctx.strokeStyle = '#6ad0ff';
  ctx.lineWidth = 3.5;
  ctx.setLineDash([10, 10]);
  ctx.lineDashOffset = dashOffset;
  ctx.shadowBlur = 6;
  ctx.shadowColor = '#6ad0ff';

  // Fixed scalar offset distance from the yellow wall surface
  const spatialOffset = 12; 

  // Direct trace path loops around the outer bounding box topology
  ctx.beginPath();
  
  let loopStarted = false;
  
  // We trace clockwise around the internal perimeter geometry
  // 1. Top edge (Left to Right)
  for (let x = defaultPad; x <= W - defaultPad; x += 4) {
    let targetY = defaultPad;
    while (targetY < H / 2 && sampleGridField(x, targetY) > 0.5) {
      targetY += 2;
    }
    const norm = getGridNormal(x, targetY);
    const px = x + norm.nx * spatialOffset;
    const py = targetY + norm.ny * spatialOffset;
    if (!loopStarted) { ctx.moveTo(px, py); loopStarted = true; } 
    else { ctx.lineTo(px, py); }
  }

  // 2. Right edge (Top to Bottom)
  for (let y = defaultPad; y <= H - defaultPad; y += 4) {
    let targetX = W - defaultPad;
    while (targetX > W / 2 && sampleGridField(targetX, y) > 0.5) {
      targetX -= 2;
    }
    const norm = getGridNormal(targetX, y);
    ctx.lineTo(targetX + norm.nx * spatialOffset, y + norm.ny * spatialOffset);
  }

  // 3. Bottom edge (Right to Left)
  for (let x = W - defaultPad; x >= defaultPad; x -= 4) {
    let targetY = H - defaultPad;
    while (targetY > H / 2 && sampleGridField(x, targetY) > 0.5) {
      targetY -= 2;
    }
    const norm = getGridNormal(x, targetY);
    ctx.lineTo(x + norm.nx * spatialOffset, targetY + norm.ny * spatialOffset);
  }

  // 4. Left edge (Bottom to Top)
  for (let y = H - defaultPad; y >= defaultPad; y -= 4) {
    let targetX = defaultPad;
    while (targetX < W / 2 && sampleGridField(targetX, y) > 0.5) {
      targetX += 2;
    }
    const norm = getGridNormal(targetX, y);
    ctx.lineTo(targetX + norm.nx * spatialOffset, y + norm.ny * spatialOffset);
  }

  ctx.closePath();
  ctx.stroke();

  ctx.setLineDash([]);
  ctx.shadowBlur = 0;
}

let dashOffset = 0;

function render() {
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0, 0, W, H);

  // Render Background Bulk Orbits Reference Grid
  if (!isQuantumPicture) {
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
    ctx.lineWidth = 1;
    for (let x = 35; x < W - 35; x += 45) {
      for (let y = 35; y < H - 35; y += 45) {
        if (sampleGridField(x, y) < 0.5 && sampleGridField(x + cyclotronRadius, y) < 0.5 && sampleGridField(x, y + cyclotronRadius) < 0.5) {
          ctx.beginPath();
          ctx.arc(x, y, cyclotronRadius, 0, 2 * Math.PI);
          ctx.stroke();
        }
      }
    }
  }

  // Draw Matrix Fields
  for (let y = 1; y < rows - 1; y++) {
    for (let x = 1; x < cols - 1; x++) {
      if (wallGrid[y * cols + x] > 0.5) {
        const right = wallGrid[y * cols + (x + 1)];
        const left = wallGrid[y * cols + (x - 1)];
        const down = wallGrid[(y + 1) * cols + x];
        const up = wallGrid[(y - 1) * cols + x];
        
        if (right < 0.5 || left < 0.5 || down < 0.5 || up < 0.5) {
          ctx.fillStyle = '#ffcc44';
          ctx.fillRect(x * gridScale, y * gridScale, gridScale, gridScale);
        } else {
          ctx.fillStyle = 'rgba(15, 23, 42, 0.4)';
          ctx.fillRect(x * gridScale, y * gridScale, gridScale, gridScale);
        }
      }
    }
  }

  if (isQuantumPicture) {
    // Execute robust continuous vector contour trace
    drawQuantumEdgeChannel(ctx, dashOffset);
    dashOffset -= 1.8; 
  } else {
    // Classical Skipping Orbits Traces
    const L = trail.length;
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    for (let i = 1; i < L; i++) {
      ctx.beginPath();
      ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
      ctx.lineTo(trail[i].x, trail[i].y);
      ctx.strokeStyle = `rgba(106, 208, 255, ${0.1 + (i / L) * 0.95})`;
      ctx.stroke();
    }

    // Active skipping electron point core
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(electron.x, electron.y, 4, 0, 2 * Math.PI);
    ctx.fill();
  }
}

function loop() {
  if (!isQuantumPicture) {
    for (let i = 0; i < substeps; i++) step();
  }
  render();
  requestAnimationFrame(loop);
}

canvas.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  handleCanvasInteraction(e.clientX, e.clientY);
});

document.getElementById('picture-toggle').addEventListener('change', (e) => {
  isQuantumPicture = e.target.checked;
  const trailLegend = document.getElementById('legend-trail');
  if (isQuantumPicture) {
    trailLegend.innerHTML = '<span class="line" style="border-style:dashed; border-color:#6ad0ff"></span> Quantum Chiral Edge Channel';
  } else {
    trailLegend.innerHTML = '<span class="line" style="border-color:#6ad0ff"></span> Fast Edge-Skipping State';
    resetElectron();
  }
});

document.getElementById('reset-btn').addEventListener('click', () => {
  resetGrid();
  resetElectron();
});

window.addEventListener('resize', setupCanvas);

resetGrid();
resetElectron();
loop();
</script>
</body>
</html>
