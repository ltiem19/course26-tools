<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>TRON GRID - PRO AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Courier New',monospace;touch-action:none}
canvas{display:block;position:fixed;inset:0}
#tapL,#tapR{position:fixed;top:0;bottom:0;width:50%;z-index:1;cursor:pointer}
#tapL{left:0}#tapR{right:0}
#flashL,#flashR{position:fixed;top:0;bottom:0;width:50%;opacity:0;pointer-events:none;z-index:2;transition:opacity .07s}
#flashL{left:0;background:linear-gradient(to right,rgba(0,255,255,.10),transparent)}
#flashR{right:0;background:linear-gradient(to left,rgba(0,255,255,.10),transparent)}
#ui{position:fixed;inset:0;pointer-events:none;z-index:3}
#hud{position:absolute;top:max(12px,env(safe-area-inset-top));left:16px;color:#ff0;font-size:12px;letter-spacing:2px;text-shadow:0 0 10px #ff0}
#rhud{position:absolute;top:max(12px,env(safe-area-inset-top));right:16px;color:#ff0;font-size:12px;letter-spacing:2px;text-shadow:0 0 10px #ff0}
#hintL,#hintR{position:fixed;bottom:max(28px,env(safe-area-inset-bottom));font-size:28px;color:rgba(255,220,0,.18);z-index:2;pointer-events:none}
#hintL{left:18px}#hintR{right:18px}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:all;z-index:10}
.hidden{display:none!important}
#menuScreen h1{font-size:clamp(40px,14vw,72px);color:#ffdd00;text-shadow:0 0 24px #ffdd00;letter-spacing:.25em;margin-bottom:8px}
.sub{color:#554400;font-size:11px;letter-spacing:.25em;margin-bottom:6px}
.hint{color:#2a2000;font-size:10px;letter-spacing:.15em;margin-bottom:30px;text-align:center;line-height:2}
.abtn{border:1px solid #ffdd00;background:transparent;color:#ffdd00;font-family:'Courier New',monospace;font-size:13px;padding:13px 36px;cursor:pointer;letter-spacing:.3em;text-shadow:0 0 8px #ffdd00;touch-action:manipulation}
.abtn:active{background:rgba(255,220,0,.14)}
#endTitle{font-size:clamp(28px,8vw,44px);letter-spacing:.18em;margin-bottom:8px;text-shadow:0 0 20px currentColor}
#endMsg{color:#776600;font-size:12px;letter-spacing:.25em;margin-bottom:26px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="tapL"></div><div id="tapR"></div>
<div id="flashL"></div><div id="flashR"></div>
<div id="hintL">&#9668;</div><div id="hintR">&#9658;</div>
<div id="ui">
  <div id="hud">SCORE: <span id="scoreEl">0</span></div>
  <div id="rhud">RND <span id="roundEl">1</span></div>
  <div id="menuScreen" class="screen">
    <h1>TRON</h1>
    <div class="sub">LIGHT CYCLE COMBAT</div>
    <div class="hint">TAP LEFT HALF ← TURN LEFT<br>TAP RIGHT HALF → TURN RIGHT</div>
    <button class="abtn" id="startBtn">ENTER GRID</button>
  </div>
  <div id="endScreen" class="screen hidden">
    <div id="endTitle" style="color:#ff4400">DEREZZED</div>
    <div id="endMsg">SCORE: 0</div>
    <button class="abtn" id="restartBtn">RECONNECT</button>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
const ARENA=80,HALF=40,CELL=0.5;
const SPD0=17,SPDINC=0.15,GRACE=1.5;
const WALLY=[0.1,0.7,1.3],MAXPTS=9000;
const C={P:0x00ffff,A:[0xff2266,0x44ffaa,0xaa44ff],W:0xffffff,BG:0x080500,GR:0x3a2800,BD:0xffcc00};

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setClearColor(C.BG);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(C.BG,0.0045);
const ISO_SIZE=30, ISO_H=72;
const camera=new THREE.OrthographicCamera(-1,1,1,-1,0.1,600);

function resize(){
  const w=window.innerWidth,h=window.innerHeight,a=w/h;
  renderer.setSize(w,h);
  camera.left=-ISO_SIZE*a;camera.right=ISO_SIZE*a;
  camera.top=ISO_SIZE;camera.bottom=-ISO_SIZE;
  camera.updateProjectionMatrix();
}
resize();window.addEventListener('resize',resize);
const camTarget=new THREE.Vector3();
camera.position.set(ISO_H,ISO_H,ISO_H);
camera.lookAt(0,0,0);

// --- ARENA SETUP ---
{
  scene.add(new THREE.GridHelper(ARENA,ARENA*2,C.GR,C.GR));
  [0.05,0.9,1.8,2.7].forEach((y,i)=>{
    const op=[1,.6,.55,.2][i];
    const pts=new Float32Array([-HALF,y,-HALF,HALF,y,-HALF,HALF,y,HALF,-HALF,y,HALF,-HALF,y,-HALF]);
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.BufferAttribute(pts,3));
    scene.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:C.BD,transparent:true,opacity:op})));
  });
}

const occ=new Map();

function isBlocked(x, z) {
  if (Math.abs(x) >= HALF - 0.5 || Math.abs(z) >= HALF - 0.5) return true;
  return occ.has(Math.floor(x/CELL) + ',' + Math.floor(z/CELL));
}

function sweepCells(x0,z0,x1,z1){
  const cells=[];
  let cx=Math.floor(x0/CELL),cz=Math.floor(z0/CELL);
  const ex=Math.floor(x1/CELL),ez=Math.floor(z1/CELL);
  cells.push(cx+','+cz);
  if(cx===ex&&cz===ez)return cells;
  const dx=x1-x0,dz=z1-z0;
  const stepX=dx>0?1:-1,stepZ=dz>0?1:-1;
  const tDX=Math.abs(CELL/dx),tDZ=Math.abs(CELL/dz);
  let tX=dx!==0?Math.abs(((dx>0?(cx+1)*CELL:cx*CELL)-x0)/dx):Infinity;
  let tZ=dz!==0?Math.abs(((dz>0?(cz+1)*CELL:cz*CELL)-z0)/dz):Infinity;
  for(let i=0;i<10;i++){
    if(tX<tZ){tX+=tDX;cx+=stepX;}else{tZ+=tDZ;cz+=stepZ;}
    cells.push(cx+','+cz);
    if(cx===ex&&cz===ez)break;
  }
  return cells;
}

function buildMoto(color){
  const g=new THREE.Group(),mat=new THREE.MeshBasicMaterial({color,wireframe:true}),lm=new THREE.LineBasicMaterial({color});
  const tg=new THREE.TorusGeometry(0.62,0.07,7,18);
  [-0.88,0.88].forEach(z=>{
    const w=new THREE.Mesh(tg,mat);w.rotation.x=Math.PI/2;w.position.z=z;g.add(w);
  });
  const eng=new THREE.Mesh(new THREE.BoxGeometry(.52,.42,.58),mat);eng.position.set(0,.45,-.05);g.add(eng);
  const torso=new THREE.Mesh(new THREE.BoxGeometry(.34,.52,.28),mat);torso.rotation.x=-.32;torso.position.set(0,1.35,.12);g.add(torso);
  const head=new THREE.Mesh(new THREE.BoxGeometry(.3,.3,.3),mat);head.position.set(0,1.75,.25);g.add(head);
  return g;
}

let uid=0;
class Cycle{
  constructor(x,z,dx,dz,color,isPlayer){
    this.id=uid++;this.pos=new THREE.Vector3(x,.65,z);
    this.dir=new THREE.Vector3(dx,0,dz);this.color=color;
    this.isPlayer=isPlayer;this.alive=true;this.dead=false;
    this.age=0;this.cd=0;
    this.mesh=buildMoto(color);this.mesh.position.copy(this.pos);scene.add(this.mesh);
    this.walls=WALLY.map(y=>{
      const geo=new THREE.BufferGeometry();
      geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(MAXPTS*3),3));
      geo.setDrawRange(0,0);
      const line=new THREE.Line(geo,new THREE.LineBasicMaterial({color}));
      line.frustumCulled=false;scene.add(line);
      return{buf:geo.attributes.position.array,attr:geo.attributes.position,geo,line,n:0};
    });
    this._push(x,z);this._push(x,z);
  }
  _push(x,z){this.walls.forEach(w=>{if(w.n>=MAXPTS)return;const b=w.n*3;w.buf[b]=x;w.buf[b+1]=WALLY[this.walls.indexOf(w)];w.buf[b+2]=z;w.n++;w.geo.setDrawRange(0,w.n);w.attr.needsUpdate=true;});}
  _last(x,z){this.walls.forEach(w=>{if(!w.n)return;const b=(w.n-1)*3;w.buf[b]=x;w.buf[b+2]=z;w.attr.needsUpdate=true;});}
  turn(left){
    if(this.cd>0)return;
    this._push(this.pos.x,this.pos.z);
    const nx=left?this.dir.z:-this.dir.z,nz=left?-this.dir.x:this.dir.x;
    this.dir.set(nx,0,nz);this.cd=0.12;
  }
  update(dt,spd){
    if(!this.alive)return;
    this.age+=dt;this.cd=Math.max(0,this.cd-dt);
    const x0=this.pos.x,z0=this.pos.z;
    this.pos.addScaledVector(this.dir,spd*dt);
    this.mesh.position.copy(this.pos);this.mesh.rotation.y=-Math.atan2(this.dir.x,this.dir.z);
    this._last(this.pos.x,this.pos.z);
    if(isBlocked(this.pos.x,this.pos.z)){this.die();return;}
    const cells=sweepCells(x0,z0,this.pos.x,this.pos.z);
    for(let i=0;i<cells.length-1;i++)if(!occ.has(cells[i]))occ.set(cells[i],this.id);
    for(let i=1;i<cells.length;i++){
      const owner=occ.get(cells[i]);
      if(owner!==undefined&&(owner!==this.id||this.age>GRACE)){this.die();return;}
    }
  }
  die(){
    if(!this.alive)return;this.alive=false;
    if(this.isPlayer)audioEngine(false);
    setTimeout(()=>{scene.remove(this.mesh);this.walls.forEach(w=>scene.remove(w.line));this.dead=true;},500);
  }
}

// --- PRO AI LOGIC ---
const lD=d=>({x:-d.z,z:d.x}), rD=d=>({x:d.z,z:-d.x});

function countArea(posX, posZ, dirX, dirZ, limit = 40) {
  let count = 0;
  let stack = [[posX + dirX * CELL, posZ + dirZ * CELL]];
  let visited = new Set();
  while (stack.length > 0 && count < limit) {
    let [cx, cz] = stack.pop();
    let key = Math.floor(cx / CELL) + ',' + Math.floor(cz / CELL);
    if (!isBlocked(cx, cz) && !visited.has(key)) {
      visited.add(key);count++;
      stack.push([cx+CELL,cz],[cx-CELL,cz],[cx,cz+CELL],[cx,cz-CELL]);
    }
  }
  return count;
}

function aiStep(c) {
  if (!c.alive || c.cd > 0) return;
  const SENSE = 6;
  if (!isBlocked(c.pos.x + c.dir.x*SENSE, c.pos.z + c.dir.z*SENSE)) return;
  const ld=lD(c.dir), rd=rD(c.dir);
  const aL=countArea(c.pos.x, c.pos.z, ld.x, ld.z, 50);
  const aR=countArea(c.pos.x, c.pos.z, rd.x, rd.z, 50);
  if(aL > aR) c.turn(true);
  else if(aR > aL) c.turn(false);
  else c.turn(Math.random() < 0.5);
}

// --- AUDIO & STATE ---
let actx=null,engGain=null;
function initAudio(){if(actx)return;actx=new(window.AudioContext||window.webkitAudioContext)();engGain=actx.createGain();engGain.gain.value=0;engGain.connect(actx.destination);}
function audioEngine(on){if(engGain)engGain.gain.setTargetAtTime(on?.1:0,actx.currentTime,.2);}

let cycles=[],player=null,state='menu',pts=0,round=1,rTimer=0,endPending=false;
const scoreEl=document.getElementById('scoreEl'),roundEl=document.getElementById('roundEl');

function newGame(){
  cycles.forEach(c=>scene.remove(c.mesh));cycles=[];occ.clear();uid=0;rTimer=0;endPending=false;
  const n=Math.min(round,3);
  [[0,32,0,-1,C.P,true],[-16,-32,0,1,C.A[0],false],[16,-32,0,1,C.A[1],false],[0,-35,1,0,C.A[2],false]].slice(0,1+n).forEach(s=>{const c=new Cycle(...s);if(c.isPlayer)player=c;cycles.push(c);});
  state='playing';audioEngine(true);
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
}

document.getElementById('startBtn').addEventListener('click',()=>{initAudio();newGame();});
document.getElementById('restartBtn').addEventListener('click',()=>{newGame();});
document.addEventListener('keydown',e=>{if(player?.alive){if(e.key==='ArrowLeft')player.turn(true);if(e.key==='ArrowRight')player.turn(false);}});

function loop(t){
  requestAnimationFrame(loop);
  const dt=0.016;
  if(state==='playing'){
    rTimer+=dt;const spd=SPD0+(round*SPDINC);
    cycles.forEach(c=>{if(!c.isPlayer)aiStep(c);c.update(dt,spd);});
    camTarget.lerp(player.pos,0.1);
    camera.position.set(camTarget.x+ISO_H,camTarget.y+ISO_H,camTarget.z+ISO_H);
    camera.lookAt(camTarget.x,0,camTarget.z);
    if(!endPending){
      if(!player.alive){endPending=true;setTimeout(()=>document.getElementById('endScreen').classList.remove('hidden'),1000);}
      else if(cycles.filter(c=>!c.isPlayer).every(c=>!c.alive)){round++;newGame();}
    }
  }
  renderer.render(scene,camera);
}
loop(0);
</script>
</body>
</html>
