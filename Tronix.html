<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>TRON GRID - ADVANCED AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Courier New',monospace;touch-action:none}
canvas{display:block;position:fixed;inset:0}
#tapL,#tapR{position:fixed;top:0;bottom:0;width:50%;z-index:1;cursor:pointer}
#tapL{left:0}#tapR{right:0}
#ui{position:fixed;inset:0;pointer-events:none;z-index:3}
#hud{position:absolute;top:max(12px,env(safe-area-inset-top));left:16px;color:#ff0;font-size:12px;letter-spacing:2px;text-shadow:0 0 10px #ff0}
#rhud{position:absolute;top:max(12px,env(safe-area-inset-top));right:16px;color:#ff0;font-size:12px;letter-spacing:2px;text-shadow:0 0 10px #ff0}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:all;z-index:10;background:rgba(0,0,0,0.8)}
.hidden{display:none!important}
#menuScreen h1{font-size:clamp(40px,14vw,72px);color:#ffdd00;text-shadow:0 0 24px #ffdd00;letter-spacing:.25em;margin-bottom:8px}
.abtn{border:1px solid #ffdd00;background:transparent;color:#ffdd00;font-family:'Courier New',monospace;font-size:13px;padding:13px 36px;cursor:pointer;letter-spacing:.3em;text-shadow:0 0 8px #ffdd00;margin-top:20px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="tapL"></div><div id="tapR"></div>
<div id="ui">
  <div id="hud">SCORE: <span id="scoreEl">0</span></div>
  <div id="rhud">RND <span id="roundEl">1</span></div>
  <div id="menuScreen" class="screen">
    <h1>TRON</h1>
    <button class="abtn" id="startBtn">ENTER GRID</button>
  </div>
  <div id="endScreen" class="screen hidden">
    <h1 id="endTitle" style="color:#ff4400">DEREZZED</h1>
    <button class="abtn" id="restartBtn">RECONNECT</button>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
// --- CONFIG ---
const ARENA=80,HALF=40,CELL=0.5;
const SPD0=17,SPDINC=0.18,GRACE=1.2;
const WALLY=[0.1,0.7,1.3],MAXPTS=9000;
const C={P:0x00ffff,A:[0xff2266,0x44ffaa,0xaa44ff],BG:0x080500,GR:0x3a2800,BD:0xffcc00};

// --- RENDERER ---
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setClearColor(C.BG);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(C.BG,0.005);
const ISO_SIZE=32, ISO_H=72;
const camera=new THREE.OrthographicCamera(-1,1,1,-1,0.1,600);
function resize(){
  const w=window.innerWidth,h=window.innerHeight,a=w/h;
  renderer.setSize(w,h);
  camera.left=-ISO_SIZE*a;camera.right=ISO_SIZE*a;camera.top=ISO_SIZE;camera.bottom=-ISO_SIZE;
  camera.updateProjectionMatrix();
}
resize();window.addEventListener('resize',resize);
const camTarget=new THREE.Vector3();
camera.position.set(ISO_H,ISO_H,ISO_H);
camera.lookAt(0,0,0);

// --- WORLD ---
scene.add(new THREE.GridHelper(ARENA,ARENA*2,C.GR,C.GR));
const occ=new Map();

function isBlocked(x, z, padding = 0.4) {
  if (Math.abs(x) >= HALF - padding || Math.abs(z) >= HALF - padding) return true;
  return occ.has(Math.floor(x/CELL) + ',' + Math.floor(z/CELL));
}

// --- CYCLE CLASS ---
class Cycle{
  constructor(x,z,dx,dz,color,isPlayer){
    this.id=Math.random();this.pos=new THREE.Vector3(x,.65,z);
    this.dir=new THREE.Vector3(dx,0,dz);this.color=color;
    this.isPlayer=isPlayer;this.alive=true;this.age=0;this.cd=0;
    this.mesh=new THREE.Group();
    const body=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.8,1.8),new THREE.MeshBasicMaterial({color,wireframe:true}));
    this.mesh.add(body);this.mesh.position.copy(this.pos);scene.add(this.mesh);
    this.walls=WALLY.map(y=>{
      const geo=new THREE.BufferGeometry();
      geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(MAXPTS*3),3));
      const line=new THREE.Line(geo,new THREE.LineBasicMaterial({color}));
      scene.add(line);
      return{buf:geo.attributes.position.array,attr:geo.attributes.position,geo,n:0};
    });
    this._push(x,z);
  }
  _push(x,z){this.walls.forEach((w,i)=>{const b=w.n*3;w.buf[b]=x;w.buf[b+1]=WALLY[i];w.buf[b+2]=z;w.n++;w.geo.setDrawRange(0,w.n);w.attr.needsUpdate=true;});}
  _last(x,z){this.walls.forEach(w=>{const b=(w.n-1)*3;w.buf[b]=x;w.buf[b+2]=z;w.attr.needsUpdate=true;});}
  turn(left){
    if(this.cd>0)return;
    this._push(this.pos.x,this.pos.z);
    const nx=left?this.dir.z:-this.dir.z,nz=left?-this.dir.x:this.dir.x;
    this.dir.set(nx,0,nz);this.cd=0.1;
  }
  update(dt,spd){
    if(!this.alive)return;
    this.age+=dt;this.cd=Math.max(0,this.cd-dt);
    const x0=this.pos.x,z0=this.pos.z;
    this.pos.addScaledVector(this.dir,spd*dt);
    this.mesh.position.copy(this.pos);this.mesh.rotation.y=-Math.atan2(this.dir.x,this.dir.z);
    this._last(this.pos.x,this.pos.z);
    if(isBlocked(this.pos.x,this.pos.z, 0.2)){this.die();return;}
    const key=Math.floor(this.pos.x/CELL)+','+Math.floor(this.pos.z/CELL);
    if(!occ.has(key))occ.set(key,this.id);
  }
  die(){this.alive=false;scene.remove(this.mesh);}
}

// --- ADVANCED AI ---
function getArea(px, pz, dx, dz, limit=60) {
  let count=0, stack=[[px+dx*CELL,pz+dz*CELL]], visited=new Set();
  while(stack.length>0 && count<limit){
    let [cx,cz]=stack.pop();
    let k=Math.floor(cx/CELL)+','+Math.floor(cz/CELL);
    if(!isBlocked(cx,cz,1.5) && !visited.has(k)){ // AI treats walls as blocked 1.5 units early
      visited.add(k);count++;
      stack.push([cx+CELL,cz],[cx-CELL,cz],[cx,cz+CELL],[cx,cz-CELL]);
    }
  }
  return count;
}

function aiStep(c, spd) {
  if(!c.alive||c.cd>0)return;
  // Lookahead scaled by velocity: check if we hit anything in the next 0.5 seconds
  const SENSE = Math.max(4, spd * 0.5); 
  if(!isBlocked(c.pos.x + c.dir.x*SENSE, c.pos.z + c.dir.z*SENSE, 1.2)) return;

  const ld={x:-c.dir.z,z:c.dir.x}, rd={x:c.dir.z,z:-c.dir.x};
  const aL=getArea(c.pos.x, c.pos.z, ld.x, ld.z);
  const aR=getArea(c.pos.x, c.pos.z, rd.x, rd.z);
  
  if(aL > aR) c.turn(true);
  else if(aR > aL) c.turn(false);
  else c.turn(Math.random()<0.5);
  c.cd = 0.15; // AI turn cooldown
}

// --- GAME LOOP ---
let cycles=[],player=null,state='menu',round=1,pts=0,endPending=false;
const scoreEl=document.getElementById('scoreEl'),roundEl=document.getElementById('roundEl');

function start(){
  occ.clear();cycles.forEach(c=>scene.remove(c.mesh));cycles=[];
  const n=Math.min(round,3);
  player=new Cycle(0,30,0,-1,C.P,true);cycles.push(player);
  for(let i=0;i<n;i++)cycles.push(new Cycle((i-1)*15,-30,0,1,C.A[i],false));
  state='playing';endPending=false;
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
}

document.getElementById('startBtn').onclick=start;
document.getElementById('restartBtn').onclick=()=>{round=1;pts=0;start();};
window.onkeydown=e=>{if(player?.alive){if(e.key==='ArrowLeft')player.turn(true);if(e.key==='ArrowRight')player.turn(false);}};
document.getElementById('tapL').ontouchstart=()=>{if(player?.alive)player.turn(true);};
document.getElementById('tapR').ontouchstart=()=>{if(player?.alive)player.turn(false);};

function loop(){
  requestAnimationFrame(loop);
  if(state==='playing'){
    const spd=SPD0+(round*SPDINC);
    cycles.forEach(c=>{if(!c.isPlayer)aiStep(c,spd);c.update(0.016,spd);});
    camTarget.lerp(player.pos,0.1);
    camera.position.set(camTarget.x+ISO_H,ISO_H,camTarget.z+ISO_H);
    camera.lookAt(camTarget.x,0,camTarget.z);
    if(!endPending){
      if(!player.alive){
        state='end';document.getElementById('endScreen').classList.remove('hidden');
      } else if(cycles.filter(c=>!c.isPlayer).every(c=>!c.alive)){
        round++;roundEl.textContent=round;start();
      }
    }
  }
  renderer.render(scene,camera);
}
loop();
</script>
</body>
</html>
