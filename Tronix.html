<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>TRON GRID</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Courier New',monospace;touch-action:none}
canvas{display:block;position:fixed;inset:0}

/* Tap zones — full screen, split 50/50, always behind game screens */
#tapL,#tapR{position:fixed;top:0;bottom:0;width:50%;z-index:1;cursor:pointer}
#tapL{left:0} #tapR{right:0}

/* Brief flash feedback on tap */
#flashL,#flashR{position:fixed;top:0;bottom:0;width:50%;opacity:0;pointer-events:none;z-index:2;transition:opacity .07s}
#flashL{left:0; background:linear-gradient(to right,rgba(0,255,255,.10),transparent)}
#flashR{right:0;background:linear-gradient(to left, rgba(0,255,255,.10),transparent)}

/* HUD */
#ui{position:fixed;inset:0;pointer-events:none;z-index:3}
#hud{position:absolute;top:max(12px,env(safe-area-inset-top));left:16px;color:#ff0;font-size:12px;letter-spacing:2px;text-shadow:0 0 10px #ff0}
#rhud{position:absolute;top:max(12px,env(safe-area-inset-top));right:16px;color:#ff0;font-size:12px;letter-spacing:2px;text-shadow:0 0 10px #ff0}

/* Tap hint arrows — permanent, subtle */
#hintL,#hintR{position:fixed;bottom:max(28px,env(safe-area-inset-bottom));font-size:28px;color:rgba(255,220,0,.18);z-index:2;pointer-events:none;letter-spacing:0}
#hintL{left:18px} #hintR{right:18px}

/* Game screens */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:all;z-index:10}
.hidden{display:none!important}
#menuScreen h1{font-size:clamp(40px,14vw,72px);color:#ffdd00;text-shadow:0 0 24px #ffdd00;letter-spacing:.25em;margin-bottom:8px}
.sub{color:#554400;font-size:11px;letter-spacing:.25em;margin-bottom:6px}
.hint{color:#2a2000;font-size:10px;letter-spacing:.15em;margin-bottom:30px;text-align:center;line-height:2}
.abtn{border:1px solid #ffdd00;background:transparent;color:#ffdd00;font-family:'Courier New',monospace;font-size:13px;padding:13px 36px;cursor:pointer;letter-spacing:.3em;text-shadow:0 0 8px #ffdd00;touch-action:manipulation}
.abtn:active{background:rgba(255,220,0,.14)}
#endTitle{font-size:clamp(28px,8vw,44px);letter-spacing:.18em;margin-bottom:8px;text-shadow:0 0 20px currentColor}
#endScore{color:#776600;font-size:12px;letter-spacing:.25em;margin-bottom:26px}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- Tap zones behind everything -->
<div id="tapL"></div>
<div id="tapR"></div>
<div id="flashL"></div>
<div id="flashR"></div>
<div id="hintL">&#9668;</div>
<div id="hintR">&#9658;</div>

<div id="ui">
  <div id="hud">SCORE: <span id="scoreEl">0</span></div>
  <div id="rhud">RND <span id="roundEl">1</span></div>

  <div id="menuScreen" class="screen">
    <h1>TRON</h1>
    <div class="sub">LIGHT CYCLE COMBAT</div>
    <div class="hint">TAP LEFT HALF ← TURN LEFT<br>TAP RIGHT HALF → TURN RIGHT</div>
    <button class="abtn" id="startBtn">ENTER GRID</button>
  </div>
  <div id="endScreen" class="screen hidden">
    <div id="endTitle" style="color:#ff4400">DEREZZED</div>
    <div id="endScore">SCORE: 0</div>
    <button class="abtn" id="restartBtn">RECONNECT</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
// ─── CONFIG ────────────────────────────────────────────────────────────────────
const ARENA=80,HALF=40,CELL=0.5;
const SPD0=17,SPDINC=0.13,GRACE=2.0;
const WALLY=[0.1,0.7,1.3],MAXPTS=9000;
const C={P:0x00ffff,A:[0xff2266,0x44ffaa,0xaa44ff],W:0xffffff,BG:0x080500,GR:0x3a2800,BD:0xffcc00};

// ─── RENDERER ──────────────────────────────────────────────────────────────────
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setClearColor(C.BG);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(C.BG,0.0045);
const ISO_SIZE=30,ISO_H=72;
const camera=new THREE.OrthographicCamera(-1,1,1,-1,0.1,600);
function resize(){
  const w=window.innerWidth,h=window.innerHeight;
  renderer.setSize(w,h);
  const a=w/h;
  camera.left=-ISO_SIZE*a;camera.right=ISO_SIZE*a;
  camera.top=ISO_SIZE;camera.bottom=-ISO_SIZE;
  camera.updateProjectionMatrix();
}
resize();window.addEventListener('resize',resize);
const camTarget=new THREE.Vector3();
camera.position.set(ISO_H,ISO_H,ISO_H);
camera.lookAt(0,0,0);

// ─── ARENA ─────────────────────────────────────────────────────────────────────
{
  scene.add(new THREE.GridHelper(ARENA,ARENA*2,C.GR,C.GR));
  [0.05,0.9,1.8,2.7].forEach((y,i)=>{
    const op=[1,.6,.55,.2][i];
    const pts=new Float32Array([-HALF,y,-HALF,HALF,y,-HALF,HALF,y,HALF,-HALF,y,HALF,-HALF,y,-HALF]);
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.BufferAttribute(pts,3));
    scene.add(new THREE.Line(g,new THREE.LineBasicMaterial({color:C.BD,transparent:true,opacity:op})));
  });
  const verts=[];
  for(let i=0;i<=4;i++){const x=-HALF+i*(ARENA/4);verts.push(x,0,-HALF,x,3,-HALF,x,0,HALF,x,3,HALF);}
  for(let i=0;i<=4;i++){const z=-HALF+i*(ARENA/4);verts.push(-HALF,0,z,-HALF,3,z,HALF,0,z,HALF,3,z);}
  const vg=new THREE.BufferGeometry();
  vg.setAttribute('position',new THREE.BufferAttribute(new Float32Array(verts),3));
  scene.add(new THREE.LineSegments(vg,new THREE.LineBasicMaterial({color:0x443300,transparent:true,opacity:.4})));
  const pm=new THREE.MeshBasicMaterial({color:0x996600,wireframe:true});
  [[-HALF,-HALF],[HALF,-HALF],[HALF,HALF],[-HALF,HALF]].forEach(([x,z])=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(1.5,8,1.5),pm);m.position.set(x,4,z);scene.add(m);
  });
}

// ─── COLLISION ─────────────────────────────────────────────────────────────────
const occ=new Map();
const ck=(x,z)=>`${Math.floor(x/CELL)},${Math.floor(z/CELL)}`;

// ─── MOTORCYCLE ────────────────────────────────────────────────────────────────
function buildMoto(color){
  const g=new THREE.Group(),mat=new THREE.MeshBasicMaterial({color,wireframe:true}),lm=new THREE.LineBasicMaterial({color});
  const tg=new THREE.TorusGeometry(0.62,0.07,7,18);
  [-0.88,0.88].forEach(z=>{
    const w=new THREE.Mesh(tg,mat);w.rotation.x=Math.PI/2;w.position.z=z;g.add(w);
    const sp=[];for(let i=0;i<8;i++){const a=i*Math.PI/4;sp.push(0,0,z,Math.cos(a)*.56,Math.sin(a)*.56,z);}
    const sg=new THREE.BufferGeometry();sg.setAttribute('position',new THREE.BufferAttribute(new Float32Array(sp),3));
    g.add(new THREE.LineSegments(sg,lm));
    const ax=new THREE.Mesh(new THREE.CylinderGeometry(.06,.06,.3,6),mat);ax.rotation.z=Math.PI/2;ax.position.z=z;g.add(ax);
  });
  [[.22,.18,-.38],[-.22,.18,-.38]].forEach(([x,y,z])=>{const sa=new THREE.Mesh(new THREE.BoxGeometry(.12,.1,1),mat);sa.position.set(x,y,z);g.add(sa);});
  const spine=new THREE.Mesh(new THREE.BoxGeometry(.15,.12,1.2),mat);spine.position.set(0,.5,-.05);g.add(spine);
  const bp=new Float32Array([0,.3,-.7,0,.95,.35]);const bg=new THREE.BufferGeometry();bg.setAttribute('position',new THREE.BufferAttribute(bp,3));g.add(new THREE.Line(bg,lm));
  const eng=new THREE.Mesh(new THREE.BoxGeometry(.52,.42,.58),mat);eng.position.set(0,.45,-.05);g.add(eng);
  const ex=new THREE.Mesh(new THREE.CylinderGeometry(.045,.06,.7,6),mat);ex.rotation.z=Math.PI/2;ex.position.set(.34,.22,-.25);g.add(ex);
  const ext=new THREE.Mesh(new THREE.CylinderGeometry(.06,.08,.15,6),mat);ext.rotation.z=Math.PI/2;ext.position.set(.72,.22,-.25);g.add(ext);
  const tank=new THREE.Mesh(new THREE.BoxGeometry(.48,.3,.62),mat);tank.position.set(0,.84,-.05);g.add(tank);
  const fair=new THREE.Mesh(new THREE.BoxGeometry(.58,.72,.5),mat);fair.position.set(0,.72,.6);g.add(fair);
  const hl=new THREE.Mesh(new THREE.BoxGeometry(.32,.18,.08),mat);hl.position.set(0,.62,.86);g.add(hl);
  const ws=new THREE.Mesh(new THREE.BoxGeometry(.28,.22,.06),mat);ws.position.set(0,1.1,.72);ws.rotation.x=-.35;g.add(ws);
  [[.22,.35,.72],[-.22,.35,.72]].forEach(([x,y,z])=>{const ff=new THREE.Mesh(new THREE.BoxGeometry(.1,.55,.1),mat);ff.rotation.x=.18;ff.position.set(x,y,z);g.add(ff);});
  const hb=new THREE.Mesh(new THREE.BoxGeometry(.9,.055,.16),mat);hb.position.set(0,1.02,.42);g.add(hb);
  [-1,1].forEach(s=>{
    const gr=new THREE.Mesh(new THREE.BoxGeometry(.055,.14,.14),mat);gr.position.set(s*.45,1.09,.42);g.add(gr);
    const arm=new THREE.Mesh(new THREE.BoxGeometry(.08,.09,.5),mat);arm.rotation.x=-.4;arm.position.set(s*.3,1.18,.38);g.add(arm);
    const fore=new THREE.Mesh(new THREE.BoxGeometry(.07,.07,.38),mat);fore.rotation.x=.3;fore.position.set(s*.35,1.05,.52);g.add(fore);
    const thigh=new THREE.Mesh(new THREE.BoxGeometry(.11,.38,.12),mat);thigh.rotation.x=.5;thigh.position.set(s*.18,.72,-.12);g.add(thigh);
    const shin=new THREE.Mesh(new THREE.BoxGeometry(.1,.35,.1),mat);shin.rotation.x=-.3;shin.position.set(s*.2,.38,-.45);g.add(shin);
  });
  const seat=new THREE.Mesh(new THREE.BoxGeometry(.42,.1,.4),mat);seat.position.set(0,.98,-.15);g.add(seat);
  const torso=new THREE.Mesh(new THREE.BoxGeometry(.34,.52,.28),mat);torso.rotation.x=-.32;torso.position.set(0,1.35,.12);g.add(torso);
  const head=new THREE.Mesh(new THREE.BoxGeometry(.3,.3,.3),mat);head.position.set(0,1.75,.25);g.add(head);
  const vis=new THREE.Mesh(new THREE.BoxGeometry(.22,.1,.04),new THREE.MeshBasicMaterial({color:C.W,wireframe:true}));vis.position.set(0,1.75,.44);g.add(vis);
  const tail=new THREE.Mesh(new THREE.BoxGeometry(.38,.2,.4),mat);tail.position.set(0,.78,-.58);g.add(tail);
  return g;
}

// ─── CYCLE ─────────────────────────────────────────────────────────────────────
let uid=0;
class Cycle{
  constructor(x,z,dx,dz,color,isPlayer){
    this.id=uid++;this.pos=new THREE.Vector3(x,.65,z);
    this.dir=new THREE.Vector3(dx,0,dz);this.color=color;
    this.isPlayer=isPlayer;this.alive=true;this.dead=false;
    this.age=0;this.cd=0;this.lastCell=null;
    this.mesh=buildMoto(color);this.mesh.position.copy(this.pos);scene.add(this.mesh);
    this.walls=WALLY.map(y=>{
      const buf=new Float32Array(MAXPTS*3),attr=new THREE.BufferAttribute(buf,3);
      const geo=new THREE.BufferGeometry();geo.setAttribute('position',attr);geo.setDrawRange(0,0);
      const line=new THREE.Line(geo,new THREE.LineBasicMaterial({color}));scene.add(line);
      return{buf,attr,geo,line,n:0};
    });
    this._push(x,z);this._push(x,z);
  }
  _push(x,z){this.walls.forEach((w,i)=>{if(w.n>=MAXPTS)return;const b=w.n*3;w.buf[b]=x;w.buf[b+1]=WALLY[i];w.buf[b+2]=z;w.n++;w.geo.setDrawRange(0,w.n);w.attr.needsUpdate=true;});}
  _last(x,z){this.walls.forEach((w,i)=>{if(!w.n)return;const b=(w.n-1)*3;w.buf[b]=x;w.buf[b+1]=WALLY[i];w.buf[b+2]=z;w.attr.needsUpdate=true;});}
  turn(left){
    if(this.cd>0)return;
    this._push(this.pos.x,this.pos.z);
    if(left){const nx=-this.dir.z,nz=this.dir.x;this.dir.x=nx;this.dir.z=nz;}
    else    {const nx= this.dir.z,nz=-this.dir.x;this.dir.x=nx;this.dir.z=nz;}
    this.cd=0.11;
  }
  update(dt,spd){
    if(!this.alive)return;
    this.age+=dt;this.cd=Math.max(0,this.cd-dt);
    this.pos.x+=this.dir.x*spd*dt;this.pos.z+=this.dir.z*spd*dt;
    this.mesh.position.copy(this.pos);this.mesh.rotation.y=-Math.atan2(this.dir.x,this.dir.z);
    this._last(this.pos.x,this.pos.z);
    if(Math.abs(this.pos.x)>=HALF-.1||Math.abs(this.pos.z)>=HALF-.1){this.die();return;}
    const k=ck(this.pos.x,this.pos.z);
    if(this.age>GRACE&&this.lastCell!==null&&this.lastCell!==k)occ.set(this.lastCell,this.id);
    this.lastCell=k;
    if(occ.has(k)){this.die();return;}
  }
  die(){
    if(!this.alive)return;this.alive=false;
    this.mesh.traverse(c=>{if(c.material)c.material.color.set(C.W);});
    this.walls.forEach(w=>w.line.material.color.set(C.W));
    for(let i=0;i<10;i++){
      const a=Math.random()*Math.PI*2,r=Math.random()*4+1;
      const pp=new Float32Array([this.pos.x,this.pos.y,this.pos.z,this.pos.x+Math.cos(a)*r,this.pos.y+Math.random()*3.5,this.pos.z+Math.sin(a)*r]);
      const pl=new THREE.Line(new THREE.BufferGeometry().setAttribute('position',new THREE.BufferAttribute(pp,3)),new THREE.LineBasicMaterial({color:this.color,transparent:true,opacity:1}));
      scene.add(pl);setTimeout(()=>scene.remove(pl),700);
    }
    if(this.isPlayer)audioEngine(false);
    setTimeout(()=>{this._rm();this.dead=true;},520);
  }
  _rm(){scene.remove(this.mesh);this.walls.forEach(w=>{scene.remove(w.line);w.geo.dispose();w.line.material.dispose();});}
}

// ─── AI ────────────────────────────────────────────────────────────────────────
const lD=d=>new THREE.Vector3(-d.z,0,d.x),rD=d=>new THREE.Vector3(d.z,0,-d.x);
function safe(pos,d,n){for(let i=1;i<=n;i++){const x=pos.x+d.x*i,z=pos.z+d.z*i;if(Math.abs(x)>=HALF-1||Math.abs(z)>=HALF-1)return false;if(occ.has(ck(x,z)))return false;}return true;}
function aiStep(c){
  if(!c.alive||c.cd>0)return;
  if(!safe(c.pos,c.dir,10)){const L=safe(c.pos,lD(c.dir),10),R=safe(c.pos,rD(c.dir),10);if(L&&!R)c.turn(true);else if(!L&&R)c.turn(false);else if(L&&R)c.turn(Math.random()<.5);}
  else if(Math.random()<.007){if(safe(c.pos,lD(c.dir),6))c.turn(true);else if(safe(c.pos,rD(c.dir),6))c.turn(false);}
}

// ─── AUDIO ─────────────────────────────────────────────────────────────────────
let actx=null,engOsc=null,engGain=null,lfoOsc=null,lfoGain=null;
function initAudio(){
  if(actx)return;
  actx=new(window.AudioContext||window.webkitAudioContext)();
  const master=actx.createGain();master.gain.value=0.14;master.connect(actx.destination);
  lfoOsc=actx.createOscillator();lfoOsc.type='sine';lfoOsc.frequency.value=6.5;
  lfoGain=actx.createGain();lfoGain.gain.value=55;lfoOsc.connect(lfoGain);lfoOsc.start();
  engOsc=actx.createOscillator();engOsc.type='sawtooth';engOsc.frequency.value=260;
  lfoGain.connect(engOsc.frequency);
  const hp=actx.createBiquadFilter();hp.type='highpass';hp.frequency.value=160;
  const pk=actx.createBiquadFilter();pk.type='peaking';pk.frequency.value=900;pk.Q.value=3;pk.gain.value=10;
  engGain=actx.createGain();engGain.gain.value=0;
  engOsc.connect(hp);hp.connect(pk);pk.connect(engGain);engGain.connect(master);engOsc.start();
  let alive=true;
  (function pulse(s){
    if(!alive)return;
    const len=Math.floor(actx.sampleRate*0.035),buf=actx.createBuffer(1,len,actx.sampleRate),d=buf.getChannelData(0);
    const acc=s%4===0||s%2===0;
    for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(acc?80:40));
    const src=actx.createBufferSource();src.buffer=buf;
    const g=actx.createGain();g.gain.value=acc?.13:.055;
    const bp=actx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=acc?3200:1800;bp.Q.value=1.5;
    src.connect(bp);bp.connect(g);g.connect(master);src.start();
    setTimeout(()=>{if(alive)pulse((s+1)%4);},60000/(130*4));
  })(0);
}
function audioEngine(on){if(!actx||!engGain)return;engGain.gain.setTargetAtTime(on?.85:0,actx.currentTime,.3);}
function audioSpeed(spd){if(!actx||!engOsc)return;engOsc.frequency.setTargetAtTime(150+(spd-SPD0)*18,actx.currentTime,.1);lfoOsc.frequency.setTargetAtTime(5+(spd-SPD0)*.3,actx.currentTime,.5);}
function playChirp(){if(!actx)return;const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=750;g.gain.setValueAtTime(.16,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.13);o.frequency.linearRampToValueAtTime(1250,actx.currentTime+.1);o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+.14);}
function playDeath(){if(!actx)return;const o=actx.createOscillator(),g=actx.createGain();o.type='sawtooth';o.frequency.value=600;g.gain.setValueAtTime(.22,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.6);o.frequency.exponentialRampToValueAtTime(60,actx.currentTime+.55);o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+.65);}

// ─── GAME STATE ────────────────────────────────────────────────────────────────
const scoreEl=document.getElementById('scoreEl'),roundEl=document.getElementById('roundEl');
const menuScr=document.getElementById('menuScreen'),endScr=document.getElementById('endScreen');
const endTitle=document.getElementById('endTitle'),endScore=document.getElementById('endScore');
let cycles=[],player=null,state='menu',score=0,round=1,rTimer=0,endPending=false;

function newGame(){
  cycles.forEach(c=>{if(!c.dead)c._rm();});cycles=[];occ.clear();uid=0;rTimer=0;endPending=false;
  scoreEl.textContent=score;roundEl.textContent=round;
  const numAI=Math.min(round,3);
  [[0,HALF-8,0,-1,C.P,true],[-16,-HALF+8,0,1,C.A[0],false],[16,-HALF+8,0,1,C.A[1],false],[0,-HALF+5,1,0,C.A[2],false]]
    .slice(0,1+numAI).forEach(s=>{const c=new Cycle(...s);if(c.isPlayer)player=c;cycles.push(c);});
  camTarget.copy(player.pos);state='playing';audioEngine(true);
  menuScr.classList.add('hidden');endScr.classList.add('hidden');
}
function triggerEnd(win){
  if(endPending)return;endPending=true;if(!win)playDeath();
  setTimeout(()=>{
    state='end';audioEngine(false);
    if(win){score+=Math.floor(rTimer*10);endTitle.style.color='#ffdd00';endTitle.textContent='GRID CLEARED';round++;}
    else{endTitle.style.color='#ff4400';endTitle.textContent='DEREZZED';score=0;round=1;}
    scoreEl.textContent=score;roundEl.textContent=round;endScore.textContent='SCORE: '+score;
    endScr.classList.remove('hidden');
  },700);
}
document.getElementById('startBtn').addEventListener('click',()=>{score=0;round=1;initAudio();newGame();});
document.getElementById('restartBtn').addEventListener('click',()=>{initAudio();newGame();});

// ─── INPUT — the only two things that matter ───────────────────────────────────
function doTurn(left){
  if(state!=='playing'||!player?.alive)return;
  player.turn(left);playChirp();
}

// Tap zones
const flashL=document.getElementById('flashL'),flashR=document.getElementById('flashR');
function flash(el){el.style.opacity='.5';setTimeout(()=>el.style.opacity='0',70);}
document.getElementById('tapL').addEventListener('touchstart',e=>{e.preventDefault();doTurn(true); flash(flashL);},{passive:false});
document.getElementById('tapR').addEventListener('touchstart',e=>{e.preventDefault();doTurn(false);flash(flashR);},{passive:false});
document.getElementById('tapL').addEventListener('mousedown',()=>{doTurn(true); flash(flashL);});
document.getElementById('tapR').addEventListener('mousedown',()=>{doTurn(false);flash(flashR);});

// Keyboard (desktop)
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft' ||e.key==='a'||e.key==='A'){e.preventDefault();doTurn(true);}
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D'){e.preventDefault();doTurn(false);}
});

// ─── CAMERA ────────────────────────────────────────────────────────────────────
function updateCam(dt){
  if(!player)return;
  camTarget.lerp(player.pos,Math.min(1,5*dt));
  camera.position.set(camTarget.x+ISO_H,camTarget.y+ISO_H,camTarget.z+ISO_H);
  camera.lookAt(camTarget.x,camTarget.y,camTarget.z);
}

// ─── LOOP ──────────────────────────────────────────────────────────────────────
let lastT=0;
function loop(t){
  requestAnimationFrame(loop);
  const dt=Math.min((t-lastT)/1000,.05);lastT=t;
  if(state==='playing'){
    rTimer+=dt;const spd=SPD0*(1+(round-1)*SPDINC);
    scoreEl.textContent=score+Math.floor(rTimer*5);
    audioSpeed(spd);
    cycles.forEach(c=>{if(!c.isPlayer)aiStep(c);c.update(dt,spd);});
    updateCam(dt);
    if(!endPending){
      if(player&&!player.alive)triggerEnd(false);
      else if(cycles.filter(c=>!c.isPlayer).every(c=>!c.alive))triggerEnd(true);
    }
  }
  renderer.render(scene,camera);
}
requestAnimationFrame(t=>{lastT=t;loop(t);});
</script>
